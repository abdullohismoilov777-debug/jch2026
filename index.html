<title>JCH 2026 — Jonli Natijalar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080f;--card:#0f1623;--card2:#111827;--border:#1e2a42;--gold:#d4a832;--gold2:#f5d06a;--green:#23c96e;--red:#e84040;--blue:#2563eb;--text:#e8eaf0;--muted:#5a6880;--uzb:#23c96e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0a1020,#0d1835);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:300}
.hdr-menu-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:.15s}
.hdr-menu-btn:hover{background:#1e2a42}
.hdr-logo{display:flex;align-items:center;gap:8px;flex:1}
.hdr-icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hdr-title{font-size:16px;font-weight:900;letter-spacing:1px;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:.5px}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lang-btn{position:relative}
.lang-sel{background:#0d1525;border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px}
.lang-sel:hover{border-color:var(--gold)}
.lang-drop{position:absolute;top:calc(100% + 4px);right:0;background:#0d1525;border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:400;min-width:120px;display:none;box-shadow:0 8px 24px #00000060}
.lang-drop.open{display:block}
.lang-opt{padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;transition:.1s}
.lang-opt:hover{background:#1e2a42}
.lang-opt.active{color:var(--gold)}
.upd-pill{font-size:10px;color:var(--muted);background:#0d1120;border:1px solid var(--border);border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* DROPDOWN MENU */
.side-overlay{position:fixed;inset:0;background:#00000060;z-index:400;display:none}
.side-overlay.open{display:block}
.side-menu{position:fixed;top:0;left:-260px;width:260px;height:100vh;background:#0a0e1e;border-right:1px solid var(--border);z-index:500;transition:left .25s ease;overflow-y:auto}
.side-menu.open{left:0}
.side-hdr{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.side-hdr-title{font-size:15px;font-weight:800;color:var(--gold)}
.side-close{margin-left:auto;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.side-item{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;font-size:14px;font-weight:600;border-bottom:1px solid #0e1525;transition:.15s}
.side-item:hover{background:#1e2a42;color:var(--gold)}
.side-item.active{color:var(--gold);background:#0d1525}
.side-icon{font-size:18px;width:24px;text-align:center}

/* MAIN 2 TABS */
.main-tabs{display:flex;background:#080c18;border-bottom:2px solid var(--border)}
.main-tab{flex:1;padding:12px 8px;background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;text-align:center}
.main-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:#0a0f1e}
.main-tab.po{}.main-tab.po.active{color:#ff6b35;border-bottom-color:#ff6b35}

/* SUB TABS */
.sub-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg);scrollbar-width:none;position:sticky;top:57px;z-index:200}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:8px 13px;background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.15s;letter-spacing:.5px}
.sub-tab:hover,.sub-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.sub-tab.uzb{color:var(--uzb)}.sub-tab.uzb.active{border-bottom-color:var(--uzb)}

/* FILTER TABS */
.filter-wrap{padding:10px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.filter-wrap::-webkit-scrollbar{display:none}
.ftab{padding:5px 12px;background:#0d1525;border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);white-space:nowrap;transition:.15s}
.ftab.active,.ftab:hover{background:#1e2a42;color:var(--gold);border-color:var(--gold)}

/* PAGES */
.page{display:none;max-width:1060px;margin:0 auto;padding:14px}
.page.active{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* SECTION TITLE */
.sec{font-size:13px;font-weight:800;letter-spacing:1.5px;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px;padding-top:4px}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* MATCH CARD */
.mlist{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 12px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;position:relative}
.mc.uzb{border-color:#1a5c3a;background:#0a1810}
.mc.live{border-color:#cc0000;animation:lp 2s infinite}
@keyframes lp{0%,100%{border-color:#880000}50%{border-color:#e84040}}
.team{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700}
.team.r{flex-direction:row-reverse;text-align:right}
.team img{width:22px;height:16px;border-radius:2px;object-fit:cover}
.uzbt{color:var(--uzb)}
.ctr{display:flex;flex-direction:column;align-items:center;gap:2px}
.sbox{background:#080c18;border:1px solid #2a3650;border-radius:7px;padding:3px 10px;text-align:center;min-width:72px}
.score{font-size:22px;font-weight:900;color:var(--gold2);letter-spacing:1px;line-height:1}
.score.tbd{font-size:18px;color:var(--muted)}
.mtime{font-size:10px;color:var(--muted)}
.mvenue{font-size:8px;color:#2a3650;max-width:110px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bdg{font-size:9px;padding:2px 7px;border-radius:6px;font-weight:700;letter-spacing:.5px}
.b-done{background:#0e2a16;color:var(--green);border:1px solid #1a4a25}
.b-live{background:#2a0000;color:#ff4444;border:1px solid #660000;animation:lp2 1s infinite}
@keyframes lp2{0%,100%{opacity:1}50%{opacity:.7}}
.b-soon{background:#0e1a2a;color:#5b8fc9;border:1px solid #1a3050}
.gbdg{position:absolute;top:5px;right:8px;font-size:9px;color:var(--gold);font-weight:700}

/* LIVE TIMER */
.live-timer{display:inline-flex;align-items:center;gap:4px;background:#1a0000;border:1px solid #660000;border-radius:6px;padding:2px 7px;font-size:11px;font-weight:800;color:#ff4444;font-family:'Roboto Condensed',sans-serif}
.live-dot{width:5px;height:5px;border-radius:50%;background:#ff4444;animation:pulse 1s infinite}

/* STANDINGS */
.sw{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.sw table{width:100%;border-collapse:collapse}
.sw th{font-size:9px;letter-spacing:1.5px;color:var(--muted);padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;font-weight:700}
.sw th:nth-child(2){text-align:left}
.sw td{padding:6px 4px;text-align:center;font-size:12px;font-weight:600;border-bottom:1px solid #0a0f1a}
.sw td:nth-child(2){text-align:left}
.sw tr:last-child td{border:none}
.sw tr:hover td{background:#0d1a2a}
.pos{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;font-size:10px;font-weight:800;background:var(--border);color:var(--muted)}
.p1{background:var(--gold)!important;color:#000!important}
.p2{background:var(--blue)!important;color:#fff!important}
.p3{background:#1a9e5c!important;color:#fff!important}
.pts{font-weight:800;color:var(--gold2)}
.gd.pos2{color:var(--green)}.gd.neg{color:#e05252}
.rq1 td{background:#0d1a0e!important}.rq2 td{background:#0d1220!important}.rq3 td{background:#0d1a18!important}
.uzr td{font-weight:800}
.tc{display:flex;align-items:center;gap:5px}
.tc img{width:18px;height:13px;border-radius:1px;object-fit:cover}

/* STATS CARDS */
.srow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.sc2{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;flex:1;min-width:70px;text-align:center}
.sn{font-size:26px;font-weight:900;color:var(--gold2);line-height:1}
.sl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px;font-weight:600}

/* UZB BANNER */
.uzb-ban{background:linear-gradient(135deg,#071510,#0a1f14);border:1px solid #23c96e40;border-radius:12px;padding:12px 14px;margin-bottom:14px}
.uzb-ban h3{font-size:14px;font-weight:800;color:var(--uzb);letter-spacing:1px;margin-bottom:7px}
.uzbs{display:flex;gap:12px;flex-wrap:wrap;align-items:center}

/* GROUP GRID */
.ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px;cursor:pointer;transition:.15s}
.gcard:hover{border-color:var(--gold);transform:translateY(-2px)}
.gcard.uzb{border-color:#1a5c3a}
.gct{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:6px;letter-spacing:.5px}
.mr2{display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid #0a0f1a;font-size:12px;font-weight:600}
.mr2:last-child{border:none}
.mt2{display:flex;align-items:center;gap:4px}
.mt2 img{width:16px;height:12px;border-radius:1px;object-fit:cover}
.mp{color:var(--gold2);font-weight:800}

/* DATE GROUP */
.dg{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;padding:8px 0 4px;text-transform:uppercase}

/* TOP SCORERS */
.scorer-list{display:flex;flex-direction:column;gap:6px}
.scorer{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:10px}
.scorer-no{font-size:13px;font-weight:800;color:var(--muted);min-width:22px}
.scorer-no.top1{color:#ffd700}.scorer-no.top2{color:#c0c0c0}.scorer-no.top3{color:#cd7f32}
.scorer-info{flex:1}
.scorer-name{font-size:13px;font-weight:700}
.scorer-team{font-size:10px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px}
.scorer-team img{width:16px;height:12px;border-radius:1px;object-fit:cover}
.scorer-goals{font-size:20px;font-weight:900;color:var(--gold2)}
.scorer-ball{font-size:11px}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.two-col{grid-template-columns:1fr}}

/* INFO BOX */
.info-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:11px;color:var(--muted);line-height:1.7}

/* BRACKET */
.bracket-outer{overflow-x:auto;padding-bottom:10px}
.bracket-flex{display:flex;align-items:stretch;gap:0;min-width:1080px}
.b-round{display:flex;flex-direction:column;flex:1;min-width:138px}
.b-round-title{text-align:center;color:var(--gold);font-size:9px;letter-spacing:1.5px;padding:5px 2px;border-bottom:1px solid var(--border);margin-bottom:4px;font-weight:800}
.b-matches{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:4px}
.b-match{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative}
.b-match.live{border-color:#cc0000}
.b-match.done{border-color:#1a5c3a}
.b-match.uzb{border-color:var(--uzb);background:#0a1810}
.b-team{display:flex;align-items:center;padding:5px 6px;font-size:11px;font-weight:700;gap:4px;border-bottom:1px solid #0a0f1a;min-height:26px}
.b-team:last-of-type{border-bottom:none}
.b-team.win{background:#0d1a0e}
.b-team.tbd{color:var(--muted);font-style:italic;font-size:9px;font-weight:400}
.b-team img{width:16px;height:12px;border-radius:1px;object-fit:cover}
.b-sc{margin-left:auto;font-size:14px;font-weight:900;color:var(--gold2);min-width:12px;text-align:center}
.b-date{font-size:7px;color:var(--muted);text-align:center;padding:2px;background:#060910}
.b-no{position:absolute;top:2px;right:4px;font-size:7px;color:#2a3650}
.b-conn{width:20px;align-self:stretch;position:relative;flex-shrink:0}
.b-final{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 6px;flex-shrink:0;width:154px}
.b-final-box{background:linear-gradient(135deg,#120e00,#1e1800);border:2px solid var(--gold);border-radius:12px;padding:8px;width:100%}

/* LOADING / ERROR */
.loading{text-align:center;padding:40px;color:var(--muted)}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:#1a0a0a;border:1px solid #4a1515;border-radius:12px;padding:14px;text-align:center;color:#e05252;margin:16px 0}
.retry-btn{background:var(--gold);color:#000;border:none;padding:7px 16px;border-radius:8px;cursor:pointer;font-weight:700;margin-top:8px;font-family:'Inter',sans-serif}
</style>
</head>

function tshTime(u) {
  if(!u) return "--:--";
  return new Date(u).toLocaleTimeString("uz",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Tashkent"});
}
function tshDate(u) {
  if(!u) return "";
  return new Date(u).toLocaleDateString("uz",{day:"2-digit",month:"2-digit",timeZone:"Asia/Tashkent"});
}
function tshDateFull(u) {
  if(!u) return "";
  var d = new Date(u);
  var days = {uz:["Yak","Dush","Sesh","Chor","Pay","Jum","Shan"],
               ru:["Вс","Пн","Вт","Ср","Чт","Пт","Сб"],
               en:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]};
  var months = {uz:["yan","fev","mar","apr","may","iyn","iyl","avg","sen","okt","noy","dek"],
                ru:["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"],
                en:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]};
  var tsh = new Date(d.getTime() + 5*3600000);
  var day = days[currentLang][tsh.getUTCDay()];
  var date = tsh.getUTCDate();
  var mon = months[currentLang][tsh.getUTCMonth()];
  var year = tsh.getUTCFullYear();
  return day+", "+date+" "+mon+" "+year;
}
function isDone(m) { return m.status === "FINISHED"; }
function isLive(m) { return m.status === "IN_PLAY" || m.status === "PAUSED"; }
function getScore(m) { var ft=(m.score&&m.score.fullTime)||{}; return {h:ft.home,a:ft.away}; }
function isToday(u) {
  if(!u) return false;
  var d = new Date(u);
  var n = new Date();
  var dT = new Date(d.getTime()+5*3600000);
  var nT = new Date(n.getTime()+5*3600000);
  return dT.toDateString() === nT.toDateString();
}

// ============================================================
function startLiveTimers() {
  clearInterval(window._timerInterval);
  var liveMatches = ALL_MATCHES.filter(isLive);
  if(!liveMatches.length) return;
  window._timerInterval = setInterval(function() {
    liveMatches.forEach(function(m) {
      var minute = m.minute || 0;
      var elapsed = Math.floor((Date.now() - window._timerStart) / 60000);
      var current = Math.min(minute + elapsed, 90);
      document.querySelectorAll(".timer-"+m.id).forEach(function(el) {
        el.textContent = current + "'";
      });
    });
  }, 30000);
}
window._timerStart = Date.now();

function liveTimerHTML(m) {
  var min = (m.minute || 0);
  return "<span class=\"live-timer\"><span class=\"live-dot\"></span><span class=\"timer-"+m.id+"\">"+min+"'</span></span>";
}

// ============================================================
// STANDINGS
// ============================================================
function calcStandings(gKey) {
  var ms = ALL_MATCHES.filter(function(m) {
    return getGroup(m.homeTeam&&m.homeTeam.name||"") === gKey;
  });
  var stats = {};
  ms.forEach(function(m) {
    var h = m.homeTeam&&m.homeTeam.name||"";
    var a = m.awayTeam&&m.awayTeam.name||"";
    if(!h||!a) return;
    if(!stats[h]) stats[h]={mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    if(!stats[a]) stats[a]={mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    if(!isDone(m)) return;
    var sc = getScore(m);
    if(sc.h===null||sc.a===null) return;
    stats[h].mp++; stats[a].mp++;
    stats[h].gf+=sc.h; stats[h].ga+=sc.a;
    stats[a].gf+=sc.a; stats[a].ga+=sc.h;
    if(sc.h>sc.a){stats[h].w++;stats[a].l++;stats[h].pts+=3;}
    else if(sc.h<sc.a){stats[a].w++;stats[h].l++;stats[a].pts+=3;}
    else{stats[h].d++;stats[a].d++;stats[h].pts++;stats[a].pts++;}
  });
  return Object.keys(stats).map(function(n){
    var s=stats[n]; return {name:n,mp:s.mp,w:s.w,d:s.d,l:s.l,gf:s.gf,ga:s.ga,gd:s.gf-s.ga,pts:s.pts};
  }).sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;});
}

function renderStandingsTable(gKey) {
  var rows = calcStandings(gKey);
  if(!rows.length) return "<div style=\"color:var(--muted);padding:8px;font-size:12px\">...</div>";
  var pC = function(i){return i===0?"p1":i===1?"p2":i===2?"p3":"";};
  var rC = function(i){return i===0?"rq1":i===1?"rq2":i===2?"rq3":"";};
  var html = "<div class=\"sw\"><table><thead><tr>"
    +"<th>#</th><th>"+T("th_team")+"</th>"
    +"<th>"+T("col_p")+"</th><th>"+T("col_w")+"</th><th>"+T("col_d")+"</th><th>"+T("col_l")+"</th>"
    +"<th>"+T("col_gf")+"</th><th>"+T("col_ga")+"</th><th>"+T("col_gd")+"</th><th>"+T("col_pts")+"</th>"
    +"</tr></thead><tbody>";
  rows.forEach(function(r,i){
    var gd=r.gd;
    html+="<tr class=\""+rC(i)+(isUzb(r.name)?" uzr":"")+"\">"
      +"<td><span class=\"pos "+pC(i)+"\">"+(i+1)+"</span></td>"
      +"<td><div class=\"tc\">"+fl(r.name)+"<span"+(isUzb(r.name)?" style=\"color:var(--uzb)\"":"")+">"
      +tName(r.name)+"</span></div></td>"
      +"<td>"+r.mp+"</td><td>"+r.w+"</td><td>"+r.d+"</td><td>"+r.l+"</td>"
      +"<td>"+r.gf+"</td><td>"+r.ga+"</td>"
      +"<td class=\"gd"+(gd>0?" pos2":gd<0?" neg":"")+"\">"+(gd>0?"+":"")+gd+"</td>"
      +"<td class=\"pts\">"+r.pts+"</td>"
      +"</tr>";
  });
  return html+"</tbody></table></div>";
}

function renderMC(m, showG) {
  var hn=m.homeTeam&&m.homeTeam.name||"";
  var an=m.awayTeam&&m.awayTeam.name||"";
  var sc=getScore(m);
  var done=isDone(m), live=isLive(m);
  var uzb=isUzb(hn)||isUzb(an);
  var gKey=getGroup(hn);
  var scoreStr=(done||live)&&sc.h!==null?sc.h+" : "+sc.a:"- : -";
  var scCls=(done||live)?"score":"score tbd";
  var timerEl=live?liveTimerHTML(m):"";
  var badge=live
    ?"<span class=\"bdg b-live\">&#x25CF; "+T("live_txt")+"</span>"
    :done?"<span class=\"bdg b-done\">&#x2713; "+T("finished")+"</span>"
    :"<span class=\"bdg b-soon\">&#x1F4C5; "+tshDate(m.utcDate)+"</span>";
  var gbdg=showG&&gKey!=="?"?"<span class=\"gbdg\">"+gKey+"</span>":"";
  return "<div class=\"mc"+(uzb?" uzb":"")+(live?" live":"")+"\">"
    +"<div class=\"team\">"+fl(hn)+"<span"+(isUzb(hn)?" class=\"uzbt\"":"")+">"
    +tName(hn)+"</span></div>"
    +"<div class=\"ctr\">"
    +"<div class=\"sbox\"><div class=\""+scCls+"\">"+scoreStr+"</div></div>"
    +(live?timerEl:"")
    +"<div class=\"mtime\">"+tshDate(m.utcDate)+" &bull; "+tshTime(m.utcDate)+" TSH</div>"
    +"<div class=\"mvenue\">"+(m.venue||"")+"</div>"
    +badge+"</div>"
    +"<div class=\"team r\">"+fl(an)+"<span"+(isUzb(an)?" class=\"uzbt\"":"")+">"
    +tName(an)+"</span></div>"
    +gbdg+"</div>";
}

var schedFilter = "ALL";
function renderSched() {
  var el=document.getElementById("schedPage");
  if(!el) return;
  var stageMap = {
    "GROUP_STAGE":"GROUP","ROUND_OF_32":"R32","LAST_32":"R32",
    "ROUND_OF_16":"R16","LAST_16":"R16","QUARTER_FINALS":"QF",
    "SEMI_FINALS":"SF","THIRD_PLACE":"F","THIRD_PLACE_MATCH":"F","FINAL":"F"
  };
  var ms=ALL_MATCHES.filter(function(m){
    if(schedFilter==="ALL") return true;
    var s=stageMap[m.stage||"GROUP_STAGE"]||"GROUP";
    return s===schedFilter;
  }).sort(function(a,b){return new Date(a.utcDate)-new Date(b.utcDate);});

  var byDate={}, dateOrder=[];
  ms.forEach(function(m){
    var d=tshDateFull(m.utcDate);
    if(!byDate[d]){byDate[d]=[];dateOrder.push(d);}
    byDate[d].push(m);
  });

  var filters=[
    {k:"ALL",l:T("filter_all")},{k:"GROUP",l:T("filter_group")},{k:"R32",l:"R32"},
    {k:"R16",l:T("filter_r16")},{k:"QF",l:T("filter_qf")},
    {k:"SF",l:T("filter_sf")},{k:"F",l:T("filter_f")}
  ];
  var fHTML=filters.map(function(f){
    return "<button class=\"ftab"+(schedFilter===f.k?" active":"")+"\" onclick=\"setSchedFilter('"+f.k+"')\">"+f.l+"</button>";
  }).join("");

  var mHTML=dateOrder.map(function(d){
    var dayMs=byDate[d];
    var done2=dayMs.filter(isDone).length;
    return "<div class=\"dg\">"+d+(done2?" &bull; "+done2+"/"+dayMs.length+" o'ynalgan":"")+"</div>"
      +"<div class=\"mlist\">"+dayMs.map(function(m){return renderMC(m,true);}).join("")+"</div>";
  }).join("");

  el.innerHTML="<div class=\"sec\">&#x1F4C5; "+T("sched_title")+"</div>"
    +"<div class=\"filter-wrap\">"+fHTML+"</div>"
    +(mHTML||"<div style=\"color:var(--muted);padding:20px;text-align:center\">...</div>");
  startLiveTimers();
}
function setSchedFilter(f){schedFilter=f;renderSched();}

function renderPlayoff() {
  var el=document.getElementById("playoffPage");
  if(!el) return;
  var apiMs=ALL_MATCHES.filter(function(m){
    var s=m.stage||"";
    return s!=="GROUP_STAGE"&&s!=="";
  });
  function findApi(d10){
    for(var i=0;i<apiMs.length;i++){
      if(apiMs[i].utcDate&&apiMs[i].utcDate.substring(0,10)===d10)return apiMs[i];
    }
    return null;
  }
  function slot(s){
    if(!s||s.indexOf("M")===0||s.indexOf("3rd")>-1)return{name:s||"?",tbd:true};
    var g=s.charAt(0),p=parseInt(s.charAt(1))-1;
    var st=calcStandings(g);
    if(st&&st[p])return{name:st[p].name,tbd:false};
    return{name:s,tbd:true};
  }
  function bTeam(name,tbd,isWin){
    if(tbd)return "<span style=\"color:var(--muted);font-style:italic;font-size:9px\">"+name+"</span>";
    return fl(name)+"<span"+(isUzb(name)?" style=\"color:var(--uzb);font-weight:800\"":"")+">"
      +tName(name)+"</span>";
  }
  function bm(h,a,dateUTC,no,apiM){
    var ht=slot(h),at=slot(a);
    var sc={h:null,a:null},done=false,live=false;
    if(apiM){sc=getScore(apiM);done=isDone(apiM);live=isLive(apiM);}
    var hw=done&&sc.h!==null&&sc.h>sc.a, aw=done&&sc.a!==null&&sc.a>sc.h;
    var uzb=(!ht.tbd&&isUzb(ht.name))||(!at.tbd&&isUzb(at.name));
    var badge=live?"<span style=\"color:#ff4444;font-size:7px\">&#x25CF; "+T("live_txt")+"</span>"
      :done?"<span style=\"color:var(--green);font-size:7px\">&#x2713; "+T("finished")+"</span>"
      :"<span style=\"color:var(--muted);font-size:7px\">"+tshDate(dateUTC)+" "+tshTime(dateUTC)+"</span>";
    return "<div class=\"b-match"+(live?" live":done?" done":"")+(uzb?" uzb":"")+"\">"
      +"<div class=\"b-no\">M"+no+"</div>"
      +"<div class=\"b-team"+(ht.tbd?" tbd":"")+(hw?" win":"")+"\">"
      +bTeam(ht.name,ht.tbd,hw)
      +"<span class=\"b-sc\">"+(( done||live)&&sc.h!==null?sc.h:"")+"</span></div>"
      +"<div class=\"b-team"+(at.tbd?" tbd":"")+(aw?" win":"")+"\">"
      +bTeam(at.name,at.tbd,aw)
      +"<span class=\"b-sc\">"+((done||live)&&sc.a!==null?sc.a:"")+"</span></div>"
      +"<div class=\"b-date\">"+badge+"</div>"
      +"</div>";
  }
  function conn(n,left){
    var lines="";
    var step=100/n;
    for(var i=0;i<n;i+=2){
      var y1=step*i+step/2, y2=step*(i+1)+step/2, ym=(y1+y2)/2;
      if(left){
        lines+="<line x1=\"0\" y1=\""+y1+"%\" x2=\"10\" y2=\""+y1+"%\" stroke=\"#1e2a42\" stroke-width=\"1\"/>";
        lines+="<line x1=\"0\" y1=\""+y2+"%\" x2=\"10\" y2=\""+y2+"%\" stroke=\"#1e2a42\" stroke-width=\"1\"/>";
        lines+="<line x1=\"10\" y1=\""+y1+"%\" x2=\"10\" y2=\""+y2+"%\" stroke=\"#1e2a42\" stroke-width=\"1\"/>";
        lines+="<line x1=\"10\" y1=\""+ym+"%\" x2=\"20\" y2=\""+ym+"%\" stroke=\"#1e2a42\" stroke-width=\"1\"/>";
      } else {
        lines+="<line x1=\"20\" y1=\""+y1+"%\" x2=\"10\" y2=\""+y1+"%\" stroke=\"#1e2a42\" stroke-width=\"1\"/>";
        lines+="<line x1=\"20\" y1=\""+y2+"%\" x2=\"10\" y2=\""+y2+"%\" stroke=\"#1e2a42\" stroke-width=\"1\"/>";
        lines+="<line x1=\"10\" y1=\""+y1+"%\" x2=\"10\" y2=\""+y2+"%\" stroke=\"#1e2a42\" stroke-width=\"1\"/>";
        lines+="<line x1=\"10\" y1=\""+ym+"%\" x2=\"0\" y2=\""+ym+"%\" stroke=\"#1e2a42\" stroke-width=\"1\"/>";
      }
    }
    return "<svg class=\"b-conn\" width=\"20\" height=\"100%\" preserveAspectRatio=\"none\" xmlns=\"http://www.w3.org/2000/svg\" style=\"min-height:"+(n*58)+"px\">"+lines+"</svg>";
  }
  function round(title,matches){
    return "<div class=\"b-round\"><div class=\"b-round-title\">"+title+"</div>"
      +"<div class=\"b-matches\">"+matches.join("")+"</div></div>";
  }

  var R32=[
    {no:73,h:"A2",a:"B2",d:"2026-06-28T23:00:00Z"},
    {no:74,h:"E1",a:"3rd(A/B/C/D/F)",d:"2026-06-29T21:30:00Z"},
    {no:75,h:"F1",a:"C2",d:"2026-06-30T06:00:00Z"},
    {no:76,h:"C1",a:"F2",d:"2026-06-29T23:00:00Z"},
    {no:77,h:"I1",a:"3rd(C/D/F/G/H)",d:"2026-06-30T02:00:00Z"},
    {no:78,h:"E2",a:"I2",d:"2026-06-30T23:00:00Z"},
    {no:79,h:"A1",a:"3rd(C/E/F/H/I)",d:"2026-07-01T06:00:00Z"},
    {no:80,h:"L1",a:"3rd(E/H/I/J/K)",d:"2026-07-01T22:00:00Z"},
    {no:81,h:"D1",a:"3rd(B/E/F/I/J)",d:"2026-07-02T02:00:00Z"},
    {no:82,h:"G1",a:"3rd(A/E/H/I/J)",d:"2026-07-02T02:00:00Z"},
    {no:83,h:"H1",a:"J2",d:"2026-07-02T23:00:00Z"},
    {no:84,h:"B1",a:"3rd(E/F/G/I/J)",d:"2026-07-03T02:30:00Z"},
    {no:85,h:"K1",a:"3rd(D/E/I/J/L)",d:"2026-07-03T02:00:00Z"},
    {no:86,h:"J1",a:"H2",d:"2026-07-03T22:30:00Z"},
    {no:87,h:"K2",a:"L2",d:"2026-07-04T23:00:00Z"},
    {no:88,h:"D2",a:"G2",d:"2026-07-05T02:00:00Z"},
  ];

  var r32L=[],r32R=[];
  for(var i=0;i<8;i++){var m=R32[i];r32L.push(bm(m.h,m.a,m.d,m.no,findApi(m.d.substring(0,10))));}
  for(var i=8;i<16;i++){var m=R32[i];r32R.push(bm(m.h,m.a,m.d,m.no,findApi(m.d.substring(0,10))));}

  function apiRound(stage){
    var ms2=apiMs.filter(function(m){return m.stage===stage;});
    ms2.sort(function(a,b){return new Date(a.utcDate)-new Date(b.utcDate);});
    return ms2;
  }
  function ph(n,dates,nos){
    var res=[];
    for(var i=0;i<n;i++) res.push(bm("TBD","TBD",dates[i]||"2026-07-10T00:00:00Z",nos[i]||"?",null));
    return res;
  }
  function apiOrPh(stage,n,dates,nos){
    var ms2=apiRound(stage);
    if(ms2.length>=n) return ms2.slice(0,n).map(function(m){
      return bm(m.homeTeam&&m.homeTeam.name||"TBD",m.awayTeam&&m.awayTeam.name||"TBD",m.utcDate,"",m);
    });
    return ph(n,dates,nos);
  }

  var r16L=apiOrPh("ROUND_OF_16",4,["2026-07-08T00:00:00Z","2026-07-08T00:00:00Z","2026-07-09T00:00:00Z","2026-07-09T00:00:00Z"],[89,90,91,92]);

  if(!r16R.length) r16R=ph(4,["2026-07-10T00:00:00Z","2026-07-10T00:00:00Z","2026-07-11T00:00:00Z","2026-07-11T00:00:00Z"],[93,94,95,96]);

  var qfL=apiOrPh("QUARTER_FINALS",2,["2026-07-13T00:00:00Z","2026-07-14T00:00:00Z"],[97,98]);
  var qfR=ph(2,["2026-07-13T00:00:00Z","2026-07-14T00:00:00Z"],[99,100]);
  var sfL=apiOrPh("SEMI_FINALS",1,["2026-07-16T00:00:00Z"],[101]);
  var sfR=ph(1,["2026-07-17T00:00:00Z"],[102]);

  var finAll=apiRound("FINAL");
  var finM=finAll[0]||null;
  var finItem=bm(finM&&finM.homeTeam&&finM.homeTeam.name||"TBD",
    finM&&finM.awayTeam&&finM.awayTeam.name||"TBD","2026-07-19T23:00:00Z",104,finM);

  var finalBlock="<div class=\"b-final\">"
    +"<div class=\"b-final-box\">"
    +"<div style=\"text-align:center;font-size:28px\">&#x1F3C6;</div>"
    +"<div style=\"text-align:center;color:var(--gold);font-size:11px;font-weight:800;letter-spacing:2px;margin:4px 0\">FINAL</div>"
    +"<div style=\"text-align:center;color:var(--muted);font-size:8px;margin-bottom:6px\">19-iyl &bull; New Jersey</div>"
    +finItem
    +"</div></div>";

  el.innerHTML="<div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px\">"
    +"<div style=\"font-size:16px;font-weight:900;letter-spacing:1px;color:#ff6b35\">&#x1F3C6; "+T("playoff_label")+"</div>"

  document.getElementById("playoffSection").style.display = s==="playoff"?"block":"none";
  document.getElementById("groupSection").style.display = "none";
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("schedPage").style.display = "none";
  document.getElementById("scorersPage").style.display = "none";
  document.getElementById("btn-main").classList.remove("active");
  document.getElementById("btn-playoff").classList.toggle("active", s==="playoff");
  if(s==="playoff") renderPlayoff();
  window.scrollTo(0,0);
}

function goPage(p) {
  currentPage = p;
  try{localStorage.setItem("jch_page",p);}catch(e){}
  document.getElementById("groupSection").style.display = p==="group_view"?"block":"none";
  document.getElementById("playoffSection").style.display = "none";
  document.getElementById("mainPage").style.display = p==="main"?"block":"none";
  document.getElementById("schedPage").style.display = p==="sched"?"block":"none";

  document.getElementById("btn-main").classList.toggle("active", p==="main");
  document.getElementById("btn-playoff").classList.remove("active");
  document.querySelectorAll(".side-item").forEach(function(el){el.classList.remove("active");});
  var sid = p==="main"?"smain":p==="group_view"?"sgroup":p==="sched"?"ssched":p==="stats"?"sstats":"smain";
  var el=document.getElementById(sid);
  if(el) el.classList.add("active");
  if(p==="main") renderMain();
  else if(p==="sched") renderSched();
  else if(p==="stats") renderStats();
  window.scrollTo(0,0);
}

function switchGroupTab(key) {
  currentGroupTab = key;
  try{localStorage.setItem("jch_gtab",key);}catch(e){}
  if(currentSection!=="group"||currentPage!=="group_view"){
    currentSection="group"; currentPage="group_view";
    document.getElementById("mainPage").style.display="none";
    document.getElementById("schedPage").style.display="none";
    document.getElementById("scorersPage").style.display="none";
    document.getElementById("playoffSection").style.display="none";
    document.getElementById("groupSection").style.display="block";
    document.getElementById("btn-main").classList.remove("active");
    document.getElementById("btn-playoff").classList.remove("active");
  }
  document.querySelectorAll(".g-page").forEach(function(p){p.style.display="none";});
  document.querySelectorAll(".g-tab").forEach(function(t){t.classList.remove("active");});
  var pg=document.getElementById("gpage-"+key);
  if(pg) pg.style.display="block";
  var tb=document.querySelector(".g-tab[data-key=\""+key+"\"]");
  if(tb) tb.classList.add("active");
  window.scrollTo(0,0);
}

function openSideMenu(){
  document.getElementById("sideMenu").classList.add("open");
  document.getElementById("sideOverlay").classList.add("open");
}
function closeSideMenu(){
  document.getElementById("sideMenu").classList.remove("open");
  document.getElementById("sideOverlay").classList.remove("open");
}

// ============================================================
// BUILD DOM
// ============================================================
function buildGroupDOM() {
  var tabsEl=document.getElementById("groupTabs");
  var pagesEl=document.getElementById("groupPages");
  var tabsHTML="";
  var pagesHTML="";
  GROUPS.forEach(function(gk){
    var isK=gk==="K";
    tabsHTML+="<button class=\"sub-tab g-tab"+(isK?" uzb":"")+"\" data-key=\""+gk+"\" onclick=\"switchGroupTab('"+gk+"')\">"
      +gk+(isK?" &#x2B50;":"")+"</button>";
    pagesHTML+="<div class=\"g-page page\" id=\"gpage-"+gk+"\" style=\"display:none\"></div>";
  });
  tabsHTML+="<button class=\"sub-tab g-tab\" data-key=\"third\" onclick=\"switchGroupTab('third')\">&#x1F949;</button>";
  pagesHTML+="<div class=\"g-page page\" id=\"gpage-third\" style=\"display:none\"></div>";
  tabsEl.innerHTML=tabsHTML;
  pagesEl.innerHTML=pagesHTML;
}

// ============================================================
// API
// ============================================================
function fetchMatches(){
  return fetch("/api/matches?type=matches")
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(d){if(d.error)throw new Error(d.error);return d.matches||[];});
}
function fetchScorers(){
  return fetch("/api/scorers")
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(d){if(d.error)throw new Error(d.error);return d.scorers||[];});
}

// ============================================================
// RE-RENDER (til o'zgarganда)
// ============================================================
function reRenderAll() {
  renderMain();
  GROUPS.forEach(function(gk){renderGroupPage(gk);});
  renderThirdPage();
  if(schedFilter) renderSched();
  if(ALL_SCORERS.length) renderStats();
  if(currentSection==="playoff") renderPlayoff();
}

// ============================================================
// INIT
// ============================================================
function updateClock() {
  var t=new Date();
  var tsh=new Date(t.getTime()+5*3600000);
  var h=String(tsh.getUTCHours()).padStart(2,"0");
  var min=String(tsh.getUTCMinutes()).padStart(2,"0");
  document.getElementById("updTime").textContent=h+":"+min+" TSH";
}

function init(){
  try{currentLang=localStorage.getItem("jch_lang")||"uz";}catch(e){}
  setLang(currentLang);
  buildGroupDOM();
  fetchMatches().then(function(matches){
    ALL_MATCHES=matches;
    renderMain();
    GROUPS.forEach(function(gk){renderGroupPage(gk);});
    renderThirdPage();
    renderSched();
    // Scorers ni background da yuklaymiz
    fetchScorers().then(function(s){
      ALL_SCORERS=s;
      renderMain(); // scorers bilan qayta render
    }).catch(function(){});
    updateClock();
    startLiveTimers();
    var hasLive=ALL_MATCHES.some(isLive);
    setTimeout(function(){location.reload();},hasLive?30000:60000);
    try{
      var savedSection=localStorage.getItem("jch_section");
      var savedPage=localStorage.getItem("jch_page");
      var savedGTab=localStorage.getItem("jch_gtab")||"A";
      if(savedSection==="playoff"){
        showSection("playoff");
      } else if(savedPage==="group_view"){
        switchGroupTab(savedGTab);
      } else if(savedPage==="sched"){
        goPage("sched");
      } else if(savedPage==="scorers"){
        goPage("scorers");
      } else {
        goPage("main");
      }
    }catch(e){goPage("main");}
  }).catch(function(err){
    document.getElementById("mainPage").innerHTML="<div class=\"err-box\">&#x26A0;&#xFE0F; "+err.message
      +"<br><button class=\"retry-btn\" onclick=\"init()\">&#x1F504; Qayta</button></div>";
    document.getElementById("mainPage").style.display="block";
    document.getElementById("groupSection").style.display="none";
  });
}

init();
</script>
