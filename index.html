<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCH 2026 — Jonli Natijalar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080f;--card:#0f1623;--border:#1e2a42;--gold:#d4a832;--gold2:#f5d06a;--green:#23c96e;--blue:#2563eb;--text:#e8eaf0;--muted:#5a6880}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}
/* HEADER */
.hdr{background:linear-gradient(135deg,#0a1020,#0d1835);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:300}
.hbtn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px}
.hbtn:hover{background:#1e2a42}
.hlogo{display:flex;align-items:center;gap:8px;flex:1}
.hicon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.htitle{font-size:16px;font-weight:900;letter-spacing:1px;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hsub{font-size:10px;color:var(--muted)}
.hright{display:flex;align-items:center;gap:8px;flex-shrink:0}
/* LANG */
.lbtn{position:relative}
.lsel{background:#0d1525;border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px}
.ldrop{position:absolute;top:calc(100% + 4px);right:0;background:#0d1525;border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:400;min-width:130px;display:none;box-shadow:0 8px 24px #000a}
.ldrop.open{display:block}
.lopt{padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.lopt:hover{background:#1e2a42}
.lopt.on{color:var(--gold)}
/* CLOCK */
.upill{font-size:10px;color:var(--muted);background:#0d1120;border:1px solid var(--border);border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* SIDEMENU */
.ovl{position:fixed;inset:0;background:#0006;z-index:400;display:none}
.ovl.on{display:block}
.smenu{position:fixed;top:0;left:-260px;width:260px;height:100vh;background:#0a0e1e;border-right:1px solid var(--border);z-index:500;transition:left .25s;overflow-y:auto}
.smenu.on{left:0}
.smhdr{padding:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.smtitle{font-size:15px;font-weight:800;color:var(--gold);flex:1}
.smclose{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.smitem{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;font-size:13px;font-weight:700;border-bottom:1px solid #0e1525;transition:.15s;color:var(--muted)}
.smitem:hover{background:#1e2a42;color:var(--gold)}
.smitem.on{background:#0d1525;color:var(--gold)}
.smicon{font-size:17px;width:22px;text-align:center}
/* MAIN 2 TABS */
.mtabs{display:flex;background:#080c18;border-bottom:2px solid var(--border)}
.mtab{flex:1;padding:12px 8px;background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;text-align:center}
.mtab.on{color:var(--gold);border-bottom-color:var(--gold);background:#0a0f1e}
.mtab.po.on{color:#ff6b35;border-bottom-color:#ff6b35}
/* GROUP SUB TABS */
.gtabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg);scrollbar-width:none;position:sticky;top:57px;z-index:200}
.gtabs::-webkit-scrollbar{display:none}
.gtab{padding:8px 13px;background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.15s}
.gtab:hover,.gtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.gtab.uzb{color:var(--green)}.gtab.uzb.on{border-bottom-color:var(--green)}
/* FILTER */
.fwrap{padding:10px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.fwrap::-webkit-scrollbar{display:none}
.ftab{padding:5px 12px;background:#0d1525;border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);white-space:nowrap;transition:.15s}
.ftab.on,.ftab:hover{background:#1e2a42;color:var(--gold);border-color:var(--gold)}
/* PAGES */
.pg{display:none;max-width:1060px;margin:0 auto;padding:14px}
.pg.on{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
/* SEC TITLE */
.sec{font-size:12px;font-weight:800;letter-spacing:1px;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px;padding-top:4px}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
/* MATCH CARD */
.mlist{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 12px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;position:relative}
.mc.uzb{border-color:#1a5c3a;background:#0a1810}
.mc.live{border-color:#cc0000;animation:lp 2s infinite}
@keyframes lp{0%,100%{border-color:#880000}50%{border-color:#e84040}}
.team{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700}
.team.r{flex-direction:row-reverse;text-align:right}
.team img{width:20px;height:15px;border-radius:2px;object-fit:cover}
.uzbt{color:var(--green)}
.ctr{display:flex;flex-direction:column;align-items:center;gap:2px}
.sbox{background:#080c18;border:1px solid #2a3650;border-radius:7px;padding:3px 10px;text-align:center;min-width:70px}
.sc{font-size:20px;font-weight:900;color:var(--gold2);letter-spacing:1px;line-height:1}
.sc.tbd{font-size:16px;color:var(--muted)}
.mtime{font-size:9px;color:var(--muted)}
.mvenue{font-size:8px;color:#2a3650;max-width:100px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bdg{font-size:9px;padding:2px 7px;border-radius:6px;font-weight:700}
.bdone{background:#0e2a16;color:var(--green);border:1px solid #1a4a25}
.blive{background:#2a0000;color:#ff4444;border:1px solid #660000}
.bsoon{background:#0e1a2a;color:#5b8fc9;border:1px solid #1a3050}
.gbdg{position:absolute;top:5px;right:8px;font-size:9px;color:var(--gold);font-weight:700}
/* LIVE TIMER */
.ltimer{display:inline-flex;align-items:center;gap:4px;background:#1a0000;border:1px solid #660000;border-radius:6px;padding:2px 7px;font-size:11px;font-weight:800;color:#ff4444}
.ldot{width:5px;height:5px;border-radius:50%;background:#ff4444;animation:pulse 1s infinite}
/* STANDINGS */
.sw{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.sw table{width:100%;border-collapse:collapse}
.sw th{font-size:9px;letter-spacing:1px;color:var(--muted);padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;font-weight:700}
.sw th:nth-child(2){text-align:left}
.sw td{padding:6px 4px;text-align:center;font-size:12px;font-weight:600;border-bottom:1px solid #0a0f1a}
.sw td:nth-child(2){text-align:left}
.sw tr:last-child td{border:none}
.sw tr:hover td{background:#0d1a2a}
.pos{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;font-size:10px;font-weight:800;background:var(--border);color:var(--muted)}
.p1{background:var(--gold)!important;color:#000!important}
.p2{background:var(--blue)!important;color:#fff!important}
.p3{background:#1a9e5c!important;color:#fff!important}
.pts{font-weight:800;color:var(--gold2)}
.gdp{color:var(--green)}.gdn{color:#e05252}
.rq1 td{background:#0d1a0e!important}.rq2 td{background:#0d1220!important}.rq3 td{background:#0d1a18!important}
.uzr td{font-weight:800}
.tc{display:flex;align-items:center;gap:5px}
.tc img{width:17px;height:12px;border-radius:1px;object-fit:cover}
/* STAT CARDS */
.srow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;flex:1;min-width:70px;text-align:center}
.snum{font-size:24px;font-weight:900;color:var(--gold2);line-height:1}
.slbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px;font-weight:600}
/* UZB BANNER */
.uban{background:linear-gradient(135deg,#071510,#0a1f14);border:1px solid #23c96e40;border-radius:12px;padding:12px 14px;margin-bottom:14px}
.uban h3{font-size:13px;font-weight:800;color:var(--green);letter-spacing:1px;margin-bottom:6px}
.ubans{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
/* INFO BOX */
.ibox{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:11px;color:var(--muted);line-height:1.7}
/* GROUP GRID */
.ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px;cursor:pointer;transition:.15s}
.gcard:hover{border-color:var(--gold);transform:translateY(-2px)}
.gcard.uzb{border-color:#1a5c3a}
.gctitle{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:6px}
.grow{display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid #0a0f1a;font-size:12px;font-weight:600}
.grow:last-child{border:none}
.grt{display:flex;align-items:center;gap:4px}
.grt img{width:15px;height:11px;border-radius:1px;object-fit:cover}
.gpts{color:var(--gold2);font-weight:800}
/* DATE GROUP */
.dglbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;padding:8px 0 4px;text-transform:uppercase}
/* SCORERS */
.sclist{display:flex;flex-direction:column;gap:6px}
.scitem{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:10px}
.scno{font-size:13px;font-weight:800;color:var(--muted);min-width:22px}
.scno.g1{color:#ffd700}.scno.g2{color:#c0c0c0}.scno.g3{color:#cd7f32}
.scinfo{flex:1}
.scname{font-size:13px;font-weight:700}
.scteam{font-size:10px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px}
.scteam img{width:15px;height:11px;border-radius:1px;object-fit:cover}
.scgoals{font-size:20px;font-weight:900;color:var(--gold2)}
/* TWO COL */
.tcol{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.tcol{grid-template-columns:1fr}}
/* BRACKET */
.brkouter{overflow-x:auto;padding-bottom:10px}
.brkflex{display:flex;align-items:stretch;gap:0;min-width:1080px}
.brkrnd{display:flex;flex-direction:column;flex:1;min-width:132px}
.brkrtitle{text-align:center;color:var(--gold);font-size:9px;letter-spacing:1px;padding:5px 2px;border-bottom:1px solid var(--border);margin-bottom:4px;font-weight:800}
.brkms{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:4px}
.brkmatch{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative}
.brkmatch.live{border-color:#cc0000}
.brkmatch.done{border-color:#1a5c3a}
.brkmatch.uzb{border-color:var(--green);background:#0a1810}
.brkteam{display:flex;align-items:center;padding:5px 6px;font-size:11px;font-weight:700;gap:4px;border-bottom:1px solid #0a0f1a;min-height:26px}
.brkteam:last-of-type{border-bottom:none}
.brkteam.win{background:#0d1a0e}
.brkteam.tbd{color:var(--muted);font-style:italic;font-size:9px;font-weight:400}
.brkteam img{width:15px;height:11px;border-radius:1px;object-fit:cover}
.brksc{margin-left:auto;font-size:14px;font-weight:900;color:var(--gold2);min-width:12px;text-align:center}
.brkdate{font-size:7px;color:var(--muted);text-align:center;padding:2px;background:#060910}
.brkno{position:absolute;top:2px;right:4px;font-size:7px;color:#2a3650}
.brkconn{width:20px;align-self:stretch;flex-shrink:0}
.brkfinal{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 6px;flex-shrink:0;width:148px}
.brkfinalbox{background:linear-gradient(135deg,#120e00,#1e1800);border:2px solid var(--gold);border-radius:12px;padding:8px;width:100%}
/* LOADING / ERROR */
.loading{text-align:center;padding:40px;color:var(--muted)}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{background:#1a0a0a;border:1px solid #4a1515;border-radius:12px;padding:14px;text-align:center;color:#e05252;margin:16px 0}
.rbtn{background:var(--gold);color:#000;border:none;padding:7px 16px;border-radius:8px;cursor:pointer;font-weight:700;margin-top:8px;font-family:'Inter',sans-serif}
</style>
</head>

function isUzb(n){ return n==='Uzbekistan'; }

function isDone(m){ return m.status==='FINISHED'; }

function getSC(m){ var f=(m.score&&m.score.fullTime)||{}; return {h:f.home,a:f.away}; }
function tT(u){
  if(!u) return '--:--';

function tD(u){

function tDF(u){

function liveHTML(m){
  return '<span class="ltimer"><span class="ldot"></span><span class="lt'+m.id+'">'+(m.minute||0)+"'</span></span>";
}
function startTimers(){
  clearInterval(window._ti);
  var lms=AM.filter(isLive);
  if(!lms.length) return;
  window._ti=setInterval(function(){
    lms.forEach(function(m){
      var el=document.querySelector('.lt'+m.id);
      if(!el) return;
      var e=Math.floor((Date.now()-window._tBase)/60000);
      el.textContent=Math.min((m.minute||0)+e,90)+"'";
    });
  },30000);
}

// STANDINGS
// ============================================================
function calcST(gk){
  var ms=AM.filter(function(m){return GRP(m.homeTeam&&m.homeTeam.name||'')===gk;});
  var s={};
  ms.forEach(function(m){
    var h=m.homeTeam&&m.homeTeam.name||'',a=m.awayTeam&&m.awayTeam.name||'';
    if(!h||!a) return;
    if(!s[h]) s[h]={mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    if(!s[a]) s[a]={mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    if(!isDone(m)) return;
    var sc=getSC(m); if(sc.h===null||sc.a===null) return;
    s[h].mp++;s[a].mp++;s[h].gf+=sc.h;s[h].ga+=sc.a;s[a].gf+=sc.a;s[a].ga+=sc.h;
    if(sc.h>sc.a){s[h].w++;s[a].l++;s[h].pts+=3;}
    else if(sc.h<sc.a){s[a].w++;s[h].l++;s[a].pts+=3;}
    else{s[h].d++;s[a].d++;s[h].pts++;s[a].pts++;}
  });
  return Object.keys(s).map(function(n){
    var r=s[n];return{name:n,mp:r.mp,w:r.w,d:r.d,l:r.l,gf:r.gf,ga:r.ga,gd:r.gf-r.ga,pts:r.pts};
  }).sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;});
}

function stHTML(gk){
  var rows=calcST(gk);
  if(!rows.length) return '<div style="color:var(--muted);padding:8px;font-size:11px">...</div>';
  var pC=function(i){return i===0?'p1':i===1?'p2':i===2?'p3':'';};
  var rC=function(i){return i===0?'rq1':i===1?'rq2':i===2?'rq3':'';};
  var h='<div class="sw"><table><thead><tr><th>#</th><th>'+T('cteam')+'</th>'
    +'<th>'+T('cp')+'</th><th>'+T('cw')+'</th><th>'+T('cd')+'</th><th>'+T('cl')+'</th>'
    +'<th>'+T('cgf')+'</th><th>'+T('cga')+'</th><th>'+T('cgd')+'</th><th>'+T('cpts')+'</th>'
    +'</tr></thead><tbody>';
  rows.forEach(function(r,i){
    var gd=r.gd;
    h+='<tr class="'+rC(i)+(isUzb(r.name)?' uzr':'')+'"><td><span class="pos '+pC(i)+'">'+(i+1)+'</span></td>'
      +'<td><div class="tc">'+FL(r.name)+'<span'+(isUzb(r.name)?' style="color:var(--green)"':'')+'>'+TN(r.name)+'</span></div></td>'
      +'<td>'+r.mp+'</td><td>'+r.w+'</td><td>'+r.d+'</td><td>'+r.l+'</td>'
      +'<td>'+r.gf+'</td><td>'+r.ga+'</td>'

      +'<td class="pts">'+r.pts+'</td></tr>';

  return h+'</tbody></table></div>';
}

    {k:'ALL',l:T('fall')},{k:'GRP',l:T('fgrp')},{k:'R32',l:'R32'},
    {k:'R16',l:T('fr16')},{k:'QF',l:T('fqf')},{k:'SF',l:T('fsf')},{k:'F',l:T('ff')}
  ];
  var fH=filters.map(function(f){
    return '<button class="ftab'+(SF===f.k?' on':'')+'" onclick="setSF(\''+f.k+'\')">'+f.l+'</button>';
  }).join('');
  var mH=dO.map(function(d){
    var dm=byD[d],dn=dm.filter(isDone).length;
    return '<div class="dglbl">'+d+(dn?' &bull; '+dn+'/'+dm.length:'')+'</div>'
      +'<div class="mlist">'+dm.map(function(m){return mcHTML(m,true);}).join('')+'</div>';
  }).join('');
  el.innerHTML='<div style="max-width:1060px;margin:0 auto"><div class="sec" style="padding:14px 14px 0">&#x1F4C5; '+T('msched')+'</div>'
    +'<div class="fwrap">'+fH+'</div>'
    +'<div style="padding:0 14px 14px">'+(mH||'<div style="color:var(--muted);padding:20px;text-align:center">...</div>')+'</div></div>';
  startTimers();
}
function setSF(f){SF=f;renderSched();}

// ============================================================
// RENDER: STATISTIKA
// ============================================================
function renderStats(){
  var el=document.getElementById('pg-stats'); if(!el) return;
  var done=AM.filter(isDone),live=AM.filter(isLive);
  var tg=0; done.forEach(function(m){var s=getSC(m);if(s.h!==null&&s.a!==null)tg+=s.h+s.a;});
  function card(v,l){return '<div class="scard"><div class="snum">'+v+'</div><div class="slbl">'+l+'</div></div>';}
  var sH='<div class="sec">&#x1F4CA; '+T('stattitle')+'</div>'
    +'<div class="srow">'+card(done.length,T('played'))+card(tg,T('goals'))
    +card(done.length?(tg/done.length).toFixed(2):'--',T('avg'))+card(48,T('teams'))+'</div>'
    +'<div class="srow">'+card(live.length,T('inplay'))+card(104-done.length,T('remaining'))
    +card(12,'GURUH')+card(16,'SHAHAR')+'</div>';

  if(!SC.length){
    el.innerHTML=sH+'<div class="loading"><div class="spin"></div></div>';
    fetchSC().then(function(s){SC=s;renderStats();}).catch(function(){
      el.innerHTML=sH+'<div class="errbox">&#x26A0;&#xFE0F; Xatolik</div>';
    });
    return;
  }
  var scH='<div class="sec">&#x26BD; '+T('scorers')+'</div><div class="sclist">';
  SC.slice(0,20).forEach(function(s,i){
    var nc=i===0?'g1':i===1?'g2':i===2?'g3':'';
    var tm=s.team&&s.team.name||'';
    scH+='<div class="scitem"><div class="scno '+nc+'">'+(i+1)+'</div>'
      +'<div class="scinfo"><div class="scname">'+(s.player&&s.player.name||'--')+'</div>'
      +'<div class="scteam">'+FL(tm)+TN(tm)+'</div></div>'
      +'<div><span class="scgoals">'+(s.goals||0)+'</span></div></div>';
  });
  el.innerHTML=sH+scH+'</div>';
}

// ============================================================
// RENDER: PLAYOFF
// ============================================================
function renderPlayoff(){
  var el=document.getElementById('pg-playoff'); if(!el) return;
  var apm=AM.filter(function(m){var s=m.stage||'';return s!=='GROUP_STAGE'&&s!=='';});
  function faD(d10){for(var i=0;i<apm.length;i++){if(apm[i].utcDate&&apm[i].utcDate.substring(0,10)===d10)return apm[i];}return null;}
  function slot(s){
    if(!s||s.indexOf('M')===0||s.indexOf('3rd')>-1)return{name:s||'?',tbd:true};
    var g=s.charAt(0),p=parseInt(s.charAt(1))-1,st=calcST(g);
    if(st&&st[p])return{name:st[p].name,tbd:false};
    return{name:s,tbd:true};
  }
  function bTeam(n,tbd){
    if(tbd)return '<span style="color:var(--muted);font-style:italic;font-size:9px">'+n+'</span>';
    return FL(n)+'<span'+(isUzb(n)?' style="color:var(--green);font-weight:800"':'')+'>'+TN(n)+'</span>';
  }
  function bm(h,a,d,no,api){
    var ht=slot(h),at=slot(a),sco={h:null,a:null},done=false,live=false;
    if(api){sco=getSC(api);done=isDone(api);live=isLive(api);}
    var hw=done&&sco.h!==null&&sco.h>sco.a,aw=done&&sco.a!==null&&sco.a>sco.h;
    var uzb=(!ht.tbd&&isUzb(ht.name))||(!at.tbd&&isUzb(at.name));
    var badge=live?'<span style="color:#ff4444;font-size:7px">&#x25CF; JONLI</span>'
      :done?'<span style="color:var(--green);font-size:7px">&#x2713;</span>'
      :'<span style="color:var(--muted);font-size:7px">'+tD(d)+'</span>';
    return '<div class="brkmatch'+(live?' live':done?' done':'')+(uzb?' uzb':'')+'"><div class="brkno">M'+no+'</div>'
      +'<div class="brkteam'+(ht.tbd?' tbd':'')+(hw?' win':'')+'">'+bTeam(ht.name,ht.tbd)+'<span class="brksc">'+((done||live)&&sco.h!==null?sco.h:'')+'</span></div>'
      +'<div class="brkteam'+(at.tbd?' tbd':'')+(aw?' win':'')+'">'+bTeam(at.name,at.tbd)+'<span class="brksc">'+((done||live)&&sco.a!==null?sco.a:'')+'</span></div>'
      +'<div class="brkdate">'+badge+'</div></div>';
  }
  function conn(n,lft){
    var lines='',st=100/n;
    for(var i=0;i<n;i+=2){
      var y1=st*i+st/2,y2=st*(i+1)+st/2,ym=(y1+y2)/2;
      if(lft){
        lines+='<line x1="0" y1="'+y1+'%" x2="10" y2="'+y1+'%" stroke="#1e2a42" stroke-width="1"/>';
        lines+='<line x1="0" y1="'+y2+'%" x2="10" y2="'+y2+'%" stroke="#1e2a42" stroke-width="1"/>';
        lines+='<line x1="10" y1="'+y1+'%" x2="10" y2="'+y2+'%" stroke="#1e2a42" stroke-width="1"/>';
        lines+='<line x1="10" y1="'+ym+'%" x2="20" y2="'+ym+'%" stroke="#1e2a42" stroke-width="1"/>';
      }else{
        lines+='<line x1="20" y1="'+y1+'%" x2="10" y2="'+y1+'%" stroke="#1e2a42" stroke-width="1"/>';
        lines+='<line x1="20" y1="'+y2+'%" x2="10" y2="'+y2+'%" stroke="#1e2a42" stroke-width="1"/>';
        lines+='<line x1="10" y1="'+y1+'%" x2="10" y2="'+y2+'%" stroke="#1e2a42" stroke-width="1"/>';
        lines+='<line x1="10" y1="'+ym+'%" x2="0" y2="'+ym+'%" stroke="#1e2a42" stroke-width="1"/>';
      }
    }
    return '<svg class="brkconn" width="20" height="100%" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="min-height:'+(n*58)+'px">'+lines+'</svg>';
  }
  function rnd(t,ms){
    return '<div class="brkrnd"><div class="brkrtitle">'+t+'</div><div class="brkms">'+ms.join('')+'</div></div>';
  }
  var R32=[
    {no:73,h:'A2',a:'B2',d:'2026-06-28T23:00:00Z'},{no:74,h:'E1',a:'3rd(A/B/C/D/F)',d:'2026-06-29T21:30:00Z'},
    {no:75,h:'F1',a:'C2',d:'2026-06-30T06:00:00Z'},{no:76,h:'C1',a:'F2',d:'2026-06-29T23:00:00Z'},
    {no:77,h:'I1',a:'3rd(C/D/F/G/H)',d:'2026-06-30T02:00:00Z'},{no:78,h:'E2',a:'I2',d:'2026-06-30T23:00:00Z'},
    {no:79,h:'A1',a:'3rd(C/E/F/H/I)',d:'2026-07-01T06:00:00Z'},{no:80,h:'L1',a:'3rd(E/H/I/J/K)',d:'2026-07-01T22:00:00Z'},
    {no:81,h:'D1',a:'3rd(B/E/F/I/J)',d:'2026-07-02T02:00:00Z'},{no:82,h:'G1',a:'3rd(A/E/H/I/J)',d:'2026-07-02T02:00:00Z'},
    {no:83,h:'H1',a:'J2',d:'2026-07-02T23:00:00Z'},{no:84,h:'B1',a:'3rd(E/F/G/I/J)',d:'2026-07-03T02:30:00Z'},
    {no:85,h:'K1',a:'3rd(D/E/I/J/L)',d:'2026-07-03T02:00:00Z'},{no:86,h:'J1',a:'H2',d:'2026-07-03T22:30:00Z'},
    {no:87,h:'K2',a:'L2',d:'2026-07-04T23:00:00Z'},{no:88,h:'D2',a:'G2',d:'2026-07-05T02:00:00Z'}
  ];
  var r32L=[],r32R=[];
  for(var i=0;i<8;i++){var m=R32[i];r32L.push(bm(m.h,m.a,m.d,m.no,faD(m.d.substring(0,10))));}
  for(var i=8;i<16;i++){var m=R32[i];r32R.push(bm(m.h,m.a,m.d,m.no,faD(m.d.substring(0,10))));}
  function apiR(stage){var r=apm.filter(function(m){return m.stage===stage;});r.sort(function(a,b){return new Date(a.utcDate)-new Date(b.utcDate);});return r;}
  function ph(n,dates,nos){var r=[];for(var i=0;i<n;i++)r.push(bm('TBD','TBD',dates[i]||'2026-07-10T00:00:00Z',nos[i]||'?',null));return r;}
  function aOrP(stage,n,dates,nos){var r=apiR(stage);if(r.length>=n)return r.slice(0,n).map(function(m){return bm(m.homeTeam&&m.homeTeam.name||'TBD',m.awayTeam&&m.awayTeam.name||'TBD',m.utcDate,'',m);});return ph(n,dates,nos);}
  var r16L=aOrP('ROUND_OF_16',4,['2026-07-08T00:00:00Z','2026-07-08T00:00:00Z','2026-07-09T00:00:00Z','2026-07-09T00:00:00Z'],[89,90,91,92]);
  var r16R=aOrP('LAST_16',4,['2026-07-10T00:00:00Z','2026-07-10T00:00:00Z','2026-07-11T00:00:00Z','2026-07-11T00:00:00Z'],[93,94,95,96]);
  if(!r16L.length)r16L=ph(4,['2026-07-08T00:00:00Z','2026-07-08T00:00:00Z','2026-07-09T00:00:00Z','2026-07-09T00:00:00Z'],[89,90,91,92]);
  if(!r16R.length)r16R=ph(4,['2026-07-10T00:00:00Z','2026-07-10T00:00:00Z','2026-07-11T00:00:00Z','2026-07-11T00:00:00Z'],[93,94,95,96]);
  var qfL=aOrP('QUARTER_FINALS',2,['2026-07-13T00:00:00Z','2026-07-14T00:00:00Z'],[97,98]);
  var qfR=ph(2,['2026-07-13T00:00:00Z','2026-07-14T00:00:00Z'],[99,100]);
  var sfL=aOrP('SEMI_FINALS',1,['2026-07-16T00:00:00Z'],[101]);
  var sfR=ph(1,['2026-07-17T00:00:00Z'],[102]);
  var finAll=apiR('FINAL'),finM=finAll[0]||null;
  var finItem=bm(finM&&finM.homeTeam&&finM.homeTeam.name||'TBD',finM&&finM.awayTeam&&finM.awayTeam.name||'TBD','2026-07-19T23:00:00Z',104,finM);
  var finBlk='<div class="brkfinal"><div class="brkfinalbox">'
    +'<div style="text-align:center;font-size:26px">&#x1F3C6;</div>'
    +'<div style="text-align:center;color:var(--gold);font-size:10px;font-weight:800;letter-spacing:2px;margin:4px 0">FINAL</div>'
    +'<div style="text-align:center;color:var(--muted);font-size:8px;margin-bottom:6px">19-iyl &bull; New Jersey</div>'
    +finItem+'</div></div>';
  el.innerHTML='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
    +'<div style="font-size:15px;font-weight:900;color:#ff6b35">&#x1F3C6; PLAYOFF BRACKET</div>'
    +'<div style="flex:1;height:1px;background:linear-gradient(90deg,#ff6b3540,transparent)"></div>'
    +'<div style="font-size:10px;color:var(--muted)">'+T('plinfo')+'</div></div>'
    +'<div class="ibox">Guruh natijalari tugashiga qarab <span style="color:var(--gold);font-weight:700">avtomatik</span> to\'ldiriladi</div>'
    +'<div class="brkouter"><div class="brkflex">'
    +rnd('R32<br><span style="color:var(--muted);font-weight:400;font-size:8px">28-30 iyn</span>',r32L)
    +conn(8,true)+rnd('R16<br><span style="color:var(--muted);font-weight:400;font-size:8px">8-9 iyl</span>',r16L)
    +conn(4,true)+rnd('CHORAK<br><span style="color:var(--muted);font-weight:400;font-size:8px">13-14 iyl</span>',qfL)
    +conn(2,true)+rnd('YARIM<br><span style="color:var(--muted);font-weight:400;font-size:8px">16-17 iyl</span>',sfL)
    +conn(1,true)+finBlk+conn(1,false)
    +rnd('YARIM<br><span style="color:var(--muted);font-weight:400;font-size:8px">16-17 iyl</span>',sfR)
    +conn(2,false)+rnd('CHORAK<br><span style="color:var(--muted);font-weight:400;font-size:8px">13-14 iyl</span>',qfR)
    +conn(4,false)+rnd('R16<br><span style="color:var(--muted);font-weight:400;font-size:8px">10-11 iyl</span>',r16R)
    +conn(8,false)+rnd('R32<br><span style="color:var(--muted);font-weight:400;font-size:8px">1-5 iyl</span>',r32R)
    +'</div></div>';
}

// ============================================================
// NAVIGATION
// ============================================================
function showOnly(pageId){
  var pages=['pg-main','pg-group','pg-sched','pg-stats','pg-playoff'];
  pages.forEach(function(p){
    var el=document.getElementById(p);
    if(!el) return;
    el.style.display = (p===pageId) ? 'block' : 'none';
  });
}

function nav(p){
  CUR=p;
  try{localStorage.setItem('jch_cur',p);}catch(e){}
  showOnly('pg-'+p);
  document.getElementById('btn-home').classList.toggle('on',p==='main');
  document.getElementById('btn-playoff').classList.toggle('on',p==='playoff');
  document.querySelectorAll('.smitem').forEach(function(el){el.classList.remove('on');});
  var sid=document.getElementById('sm-'+p);
  if(sid) sid.classList.add('on');
  if(p==='main') renderMain();
  else if(p==='sched') renderSched();
  else if(p==='stats') renderStats();
  else if(p==='playoff') renderPlayoff();
  else if(p==='group') navGroup(CGRP);
  window.scrollTo(0,0);
}

function navGroup(gk){
  CGRP=gk;
  CUR='group';
  try{localStorage.setItem('jch_cur','group');localStorage.setItem('jch_grp',gk);}catch(e){}
  showOnly('pg-group');
  document.getElementById('btn-home').classList.remove('on');
  document.getElementById('btn-playoff').classList.remove('on');
  document.querySelectorAll('.smitem').forEach(function(el){el.classList.remove('on');});
  var sg=document.getElementById('sm-group'); if(sg) sg.classList.add('on');
  document.querySelectorAll('.gp').forEach(function(p){p.style.display='none';});
  document.querySelectorAll('.gtab').forEach(function(t){t.classList.remove('on');});
  var pg=document.getElementById('gp-'+gk);
  var tb=document.querySelector('.gtab[data-key="'+gk+'"]');
  if(pg) pg.style.display='block';
  if(tb) tb.classList.add('on');
  if(gk==='third') renderThird(); else renderGroup(gk);
  window.scrollTo(0,0);
}

// ============================================================
// LANG
// ============================================================
function setLang(l){
  CL=l;
  try{localStorage.setItem('jch_lang',l);}catch(e){}
  document.getElementById('ldrop').classList.remove('open');
  var flags={uz:'&#x1F1FA;&#x1F1FF;',ru:'&#x1F1F7;&#x1F1FA;',en:'&#x1F1EC;&#x1F1E7;'};
  document.getElementById('lf').innerHTML=flags[l];
  document.getElementById('ll').textContent=l.toUpperCase();
  document.querySelectorAll('.lopt').forEach(function(o,i){o.classList.toggle('on',['uz','ru','en'][i]===l);});
  var ids={
    't-sm-main':'mmain','t-sm-group':'mgroup','t-sm-sched':'msched','t-sm-stats':'mstats',
    't-btn-home':'tbhome','t-btn-playoff':'tbplayoff'
  };
  for(var id in ids){var el=document.getElementById(id);if(el)el.textContent=T(ids[id]);}
  reRender();
}
function toggleLD(){document.getElementById('ldrop').classList.toggle('open');}
document.addEventListener('click',function(e){if(!e.target.closest('.lbtn'))document.getElementById('ldrop').classList.remove('open');});
function openSM(){document.getElementById('smenu').classList.add('on');document.getElementById('ovl').classList.add('on');}
function closeSM(){document.getElementById('smenu').classList.remove('on');document.getElementById('ovl').classList.remove('on');}

function reRender(){
  renderMain();
  GS.forEach(function(gk){renderGroup(gk);});
  renderThird(); renderSched();
  if(SC.length) renderStats();
  if(CUR==='playoff') renderPlayoff();
}

// ============================================================
// BUILD GROUP DOM
// ============================================================
function buildGroups(){
  var tabs=document.getElementById('gtabs'),pgs=document.getElementById('gpages');
  var tH='',pH='';
  GS.forEach(function(gk){
    var isK=gk==='K';
    tH+='<button class="gtab'+(isK?' uzb':'')+'" data-key="'+gk+'" onclick="navGroup(\''+gk+'\')">'+gk+(isK?' &#x2B50;':'')+'</button>';
    pH+='<div class="gp" id="gp-'+gk+'" style="display:none"></div>';
  });
  tH+='<button class="gtab" data-key="third" onclick="navGroup(\'third\')">&#x1F949;</button>';
  pH+='<div class="gp" id="gp-third" style="display:none"></div>';
  tabs.innerHTML=tH; pgs.innerHTML=pH;
}

// ============================================================
// API
// ============================================================
function fetchAM(){
  return fetch('/api/matches?type=matches')
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){if(d.error)throw new Error(d.error);return d.matches||[];});
}
function fetchSC(){
  return fetch('/api/scorers')
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){if(d.error)throw new Error(d.error);return d.scorers||[];});
}

function updateClock(){
  var t=new Date(),tsh=new Date(t.getTime()+5*3600000);
  document.getElementById('clk').textContent=String(tsh.getUTCHours()).padStart(2,'0')+':'+String(tsh.getUTCMinutes()).padStart(2,'0')+' TSH';
}

// ============================================================
// INIT
// ============================================================
function init(){
  try{CL=localStorage.getItem('jch_lang')||'uz';}catch(e){}
  setLang(CL);
  buildGroups();
  // pg-main ko'rinmoqda, loading ko'rinib turibdi
  document.getElementById('pg-main').style.display='block';

  fetchAM().then(function(m){
    AM=m;
    updateClock();
    renderMain();
    GS.forEach(function(gk){renderGroup(gk);});
    renderThird();
    renderSched();
    var hasLive=AM.some(isLive);
    setTimeout(function(){location.reload();},hasLive?30000:60000);
    fetchSC().then(function(s){SC=s;}).catch(function(){});
    // Oxirgi sahifaga qaytish
    try{
      var cp=localStorage.getItem('jch_cur');
      var cg=localStorage.getItem('jch_grp')||'A';
      if(cp==='playoff') nav('playoff');
      else if(cp==='group'){CGRP=cg;navGroup(cg);}
      else if(cp==='sched') nav('sched');
      else if(cp==='stats') nav('stats');
      else nav('main');
    }catch(e){nav('main');}
  }).catch(function(err){
    document.getElementById('pg-main').innerHTML=
      '<div style="max-width:1060px;margin:0 auto;padding:14px">'
      +'<div class="errbox">&#x26A0;&#xFE0F; API xatolik: '+err.message
      +'<br><small style="color:#888">API token yoki tarmoq muammosi</small>'
      +'<br><button class="rbtn" onclick="init()">&#x1F504; Qayta urinish</button></div></div>';
  });
}
init();
</script>
