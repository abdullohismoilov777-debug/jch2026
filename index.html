<title>JCH 2026 — Jonli Natijalar</title>

<style>
:root {
  --bg:#06080f; --surface:#0d1120; --card:#111827;
  --border:#1e2a42; --gold:#d4a832; --gold2:#f5d06a;
  --green:#1a9e5c; --green2:#23c96e; --red:#c0392b;
  --blue:#2563eb; --text:#e8eaf0; --muted:#5a6880;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}

/* HEADER */
header{
  background:linear-gradient(135deg,#0c1525 0%,#0f1e3a 100%);
  border-bottom:1px solid var(--border);
  padding:18px 20px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px
}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{
  width:44px;height:44px;border-radius:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 0 20px #d4a83230;flex-shrink:0
}
h1{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.update-info{font-size:12px;color:var(--muted);background:var(--surface);
  border:1px solid var(--border);border-radius:20px;padding:6px 14px}
.update-info span{color:var(--green2);font-weight:600}

/* NAV TABS */
.tabs{
  display:flex;overflow-x:auto;border-bottom:1px solid var(--border);
  background:var(--bg);position:sticky;top:0;z-index:100;scrollbar-width:none
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:11px 18px;background:none;border:none;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;
  letter-spacing:1.5px;cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .15s
}
.tab.active,.tab:hover{color:var(--gold);border-bottom-color:var(--gold)}
.tab.uzb{color:#23c96e}
.tab.uzb.active,.tab.uzb:hover{border-bottom-color:#23c96e}

/* PAGE */
.page{display:none;max-width:1100px;margin:0 auto;padding:20px 16px}
.page.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* SECTION */
.sec-title{
  font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;
  color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:10px
}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* MATCH CARDS — Result style */
.matches-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.match-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 16px;display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:10px;transition:border-color .15s
}
.match-card:hover{border-color:#2e3f5e}
.match-card.uzb-match{border-color:#1a5c3a;background:#0a1a10}
.match-card.uzb-match:hover{border-color:#23c96e}
.match-card.upcoming{opacity:.8;border-style:dashed}
.match-card.today-upcoming{border-color:#1e3a5f;background:#0a1020}

.team{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px}
.team.right{flex-direction:row-reverse;text-align:right}
.flag{font-size:20px;flex-shrink:0}
.team-name.uzb{color:#23c96e}

.center{display:flex;flex-direction:column;align-items:center;gap:3px}
.score-box{
  background:#0d1525;border:1px solid #2a3650;border-radius:8px;
  padding:5px 14px;text-align:center
}
.score{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--gold2);letter-spacing:3px;line-height:1}
.score.upcoming{color:var(--muted);font-size:22px}
.match-time{font-size:11px;color:var(--muted);letter-spacing:.5px}
.match-venue{font-size:10px;color:#344158;letter-spacing:.3px;max-width:130px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}
.badge-done{background:#0e2a16;color:var(--green2);border:1px solid #1a4a25}
.badge-soon{background:#0e1a2a;color:#5b8fc9;border:1px solid #1a3050}
.badge-today{background:#1a2a0e;color:#8bc34a;border:1px solid #2a4015}

/* STANDINGS */
.standings-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
.standings-wrap table{width:100%;border-collapse:collapse}
.standings-wrap th{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.5px;
  color:var(--muted);padding:9px 6px;border-bottom:1px solid var(--border);text-align:center
}
.standings-wrap th:first-child{text-align:left;padding-left:12px;width:36px}
.standings-wrap th:nth-child(2){text-align:left}
.standings-wrap td{padding:9px 6px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;border-bottom:1px solid #0e1525}
.standings-wrap td:first-child{text-align:left;padding-left:12px}
.standings-wrap td:nth-child(2){text-align:left}
.standings-wrap tr:last-child td{border-bottom:none}
.standings-wrap tr:hover td{background:#0d1a2a}
.pos{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;font-size:12px;font-weight:700;background:var(--border);color:var(--muted)}
.pos.p1{background:var(--gold);color:#000}
.pos.p2{background:#2563eb;color:#fff}
.pos.p3{background:#1a9e5c;color:#fff}
.team-cell{display:flex;align-items:center;gap:7px}
.pts{font-weight:700;color:var(--gold2);font-size:15px}
.gd.pos{color:var(--green2)} .gd.neg{color:#e05252}
.row-q1 td{background:#0d1a0e!important}
.row-q2 td{background:#0d1220!important}
.row-q3 td{background:#0d1a18!important}
.uzb-row td{font-weight:600}

/* GROUPS GRID */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.group-mini{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px;cursor:pointer;transition:border-color .15s,transform .1s
}
.group-mini:hover{border-color:var(--gold);transform:translateY(-2px)}
.group-mini.uzb-g{border-color:#1a5c3a}
.group-mini-title{font-family:'Bebas Neue',cursive;font-size:19px;letter-spacing:2px;color:var(--gold);margin-bottom:8px}
.mini-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid #0e1525;font-family:'Barlow Condensed',sans-serif;font-size:13px}
.mini-row:last-child{border:none}
.mini-team{display:flex;align-items:center;gap:5px}
.mini-pts{color:var(--gold2);font-weight:700}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:680px){.two-col{grid-template-columns:1fr}.groups-grid{grid-template-columns:1fr}}

/* LEGEND */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.leg{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted)}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* UZB BANNER */
.uzb-banner{
  background:linear-gradient(135deg,#0a1f14,#0d2418);
  border:1px solid #23c96e40;border-radius:14px;
  padding:16px 18px;margin-bottom:20px
}
.uzb-banner h3{font-family:'Bebas Neue',cursive;font-size:20px;color:#23c96e;letter-spacing:2px;margin-bottom:10px}

/* STATS */
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;flex:1;min-width:100px;text-align:center}
.stat-num{font-family:'Bebas Neue',cursive;font-size:32px;color:var(--gold2);line-height:1}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
</style>
</head>

      {h:"Kongo DR",a:"O'zbekiston",hs:null,as:null,date:"28.06",time:"04:30 TSH",venue:"Atlanta",uzb:true,status:"upcoming"},
    ]
  },
  "L":{
    teams:["Angliya","Gana","Xorvatiya","Panama"],
    matches:[
      {h:"Angliya",a:"Xorvatiya",hs:4,as:2,date:"18.06",time:"01:00 TSH",venue:"Dallas",status:"done"},
      {h:"Gana",a:"Panama",hs:1,as:0,date:"18.06",time:"04:00 TSH",venue:"Toronto",status:"done"},
      {h:"Angliya",a:"Gana",hs:null,as:null,date:"24.06",time:"01:00 TSH",venue:"Boston",status:"today"},
      {h:"Panama",a:"Xorvatiya",hs:null,as:null,date:"24.06",time:"04:00 TSH",venue:"Toronto",status:"today"},
      {h:"Panama",a:"Angliya",hs:null,as:null,date:"28.06",time:"02:00 TSH",venue:"New York",status:"upcoming"},
      {h:"Xorvatiya",a:"Gana",hs:null,as:null,date:"28.06",time:"02:00 TSH",venue:"Philadelphia",status:"upcoming"},
    ]
  },
};

// Turnirgа bal hisoblash
function calcStandings(gKey){
  const g=GROUPS[gKey], stats={};
  g.teams.forEach(t=>stats[t]={mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
  g.matches.forEach(m=>{
    if(m.status!=="done"||m.hs===null)return;
    stats[m.h].mp++;stats[m.a].mp++;
    stats[m.h].gf+=m.hs;stats[m.h].ga+=m.as;
    stats[m.a].gf+=m.as;stats[m.a].ga+=m.hs;
    if(m.hs>m.as){stats[m.h].w++;stats[m.a].l++;stats[m.h].pts+=3}
    else if(m.hs<m.as){stats[m.a].w++;stats[m.h].l++;stats[m.a].pts+=3}
    else{stats[m.h].d++;stats[m.a].d++;stats[m.h].pts++;stats[m.a].pts++}
  });
  return g.teams.map(t=>({name:t,...stats[t],gd:stats[t].gf-stats[t].ga}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name));
}

// ============================================================
// RENDER
// ============================================================
function matchCard(m,gKey){
  const done=m.status==="done", today=m.status==="today";
  const uzb=m.uzb||false;
  const cls=`match-card${uzb?" uzb-match":""}${m.status==="upcoming"?" upcoming":""}${today?" today-upcoming":""}`;
  const scoreStr=done?`${m.hs} : ${m.as}`:`${today?"~":"—"}`;
  const scoreCls=done?"score":"score upcoming";
  const badge=done?`<span class="status-badge badge-done">✓ TUGADI</span>`:
    today?`<span class="status-badge badge-today">⚡ BUGUN</span>`:
    `<span class="status-badge badge-soon">📅 KUTILMOQDA</span>`;
  return `<div class="${cls}">
    <div class="team"><span class="flag">${f(m.h)}</span><span${m.h==="O'zbekiston"?' class="team-name uzb"':''}>${m.h}</span></div>
    <div class="center">
      <div class="score-box"><div class="${scoreCls}">${scoreStr}</div></div>
      <div class="match-time">${m.date} · ${m.time}</div>
      <div class="match-venue">${m.venue}</div>
      ${badge}
    </div>
    <div class="team right"><span class="flag">${f(m.a)}</span><span${m.a==="O'zbekiston"?' class="team-name uzb"':''}>${m.a}</span></div>
  </div>`;
}

function standingsTable(gKey){
  const rows=calcStandings(gKey);
  const posClass=(i)=>i===0?"p1":i===1?"p2":i===2?"p3":"";
  const rowClass=(i)=>i===0?"row-q1":i===1?"row-q2":i===2?"row-q3":"";
  return `<div class="standings-wrap"><table>
    <thead><tr>
      <th>#</th><th>JAMOA</th>
      <th>O</th><th>G</th><th>D</th><th>M</th>
      <th>UG</th><th>KG</th><th>FF</th><th>BAL</th>
    </tr></thead>
    <tbody>
    ${rows.map((r,i)=>`<tr class="${rowClass(i)}${r.name==="O'zbekiston"?" uzb-row":""}">
      <td><span class="pos ${posClass(i)}">${i+1}</span></td>
      <td><div class="team-cell"><span>${f(r.name)}</span><span>${r.name}</span></div></td>
      <td>${r.mp}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
      <td>${r.gf}</td><td>${r.ga}</td>
      <td class="gd${r.gd>0?" pos":r.gd<0?" neg":""}">${r.gd>0?"+":""}${r.gd}</td>
      <td class="pts">${r.pts}</td>
    </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function renderGroupPage(gKey){
  const g=GROUPS[gKey];
  const done=g.matches.filter(m=>m.status==="done");
  const today=g.matches.filter(m=>m.status==="today");
  const upcoming=g.matches.filter(m=>m.status==="upcoming");
  const uzbMatch=g.uzb;
  return `
  <div class="page" id="page-${gKey}">
    <h2 class="sec-title">🏅 GURUH ${gKey}${g.uzb?' — <span style="color:#23c96e">O\'ZBEKISTON GURUHI ⭐</span>':''}</h2>
    ${uzbMatch?renderUzbStatus(gKey):''}
    <div class="two-col">
      <div>
        <div class="sec-title" style="font-size:17px">TURNIR JADVALI</div>
        ${standingsTable(gKey)}
        <div class="legend">
          <div class="leg"><div class="ldot" style="background:var(--gold)"></div>1-o'rin → Playoff</div>
          <div class="leg"><div class="ldot" style="background:#2563eb"></div>2-o'rin → Playoff</div>
          <div class="leg"><div class="ldot" style="background:var(--green)"></div>3-o'rin → Ehtimol</div>
        </div>
      </div>
      <div>
        ${today.length?`<div class="sec-title" style="font-size:17px;color:#8bc34a">⚡ BUGUNGI O'YINLAR</div>
        <div class="matches-grid">${today.map(m=>matchCard(m,gKey)).join('')}</div>`:''}
        ${done.length?`<div class="sec-title" style="font-size:17px">✅ TUGAGAN O'YINLAR</div>
        <div class="matches-grid">${done.map(m=>matchCard(m,gKey)).join('')}</div>`:''}
        ${upcoming.length?`<div class="sec-title" style="font-size:17px">📅 KELGUSI O'YINLAR</div>
        <div class="matches-grid">${upcoming.map(m=>matchCard(m,gKey)).join('')}</div>`:''}
      </div>
    </div>
  </div>`;
}

function renderUzbStatus(gKey){
  const st=calcStandings(gKey);
  const uzb=st.find(r=>r.name==="O'zbekiston");
  const pos=st.findIndex(r=>r.name==="O'zbekiston")+1;
  const next=GROUPS[gKey].matches.find(m=>m.uzb&&m.status!=="done");
  const posText=pos===1?"🥇 1-O'RIN":pos===2?"🥈 2-O'RIN":pos===3?"🥉 3-O'RIN":"4-O'RIN";
  const playoffText=pos<=2?"✅ PLAYOFF GA CHIQMOQDA":pos===3?"⚠️ EHTIMOLIY PLAYOFF":"❌ HOZIRCHA TASHQARIDA";
  return `<div class="uzb-banner">
    <h3>🇺🇿 O'ZBEKISTON HOLATI</h3>
    <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center">
      <div style="font-family:'Bebas Neue',cursive;font-size:28px;color:#23c96e">${posText}</div>
      <div style="font-size:14px;color:#23c96e">${playoffText}</div>
      <div style="font-size:13px;color:var(--muted)">${uzb.pts} ball · FF: ${uzb.gd>0?"+":""}${uzb.gd}</div>
      ${next?`<div style="font-size:13px;color:#f5d06a">⚡ Keyingi: ${next.h} vs ${next.a} · ${next.date} ${next.time}</div>`:''}
    </div>
  </div>`;
}

function renderOverview(){
  // Bugungi va kechagi o'yinlar
  const allToday=[], allDone=[];
  Object.keys(GROUPS).forEach(gk=>{
    GROUPS[gk].matches.forEach(m=>{
      if(m.status==="today") allToday.push({...m,gKey:gk});
      if(m.status==="done"&&(m.date==="21.06"||m.date==="22.06")) allDone.push({...m,gKey:gk});
    });
  });

  // Umumiy statistika
  let totalGoals=0,totalPlayed=0;
  Object.keys(GROUPS).forEach(gk=>{
    GROUPS[gk].matches.forEach(m=>{
      if(m.status==="done"&&m.hs!==null){totalGoals+=m.hs+m.as;totalPlayed++}
    });
  });

  return `<div class="page active" id="page-all">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${totalPlayed}</div><div class="stat-label">O'YINLAR TUGADI</div></div>
      <div class="stat-card"><div class="stat-num">${totalGoals}</div><div class="stat-label">JAMI GOLLAR</div></div>
      <div class="stat-card"><div class="stat-num">${(totalGoals/totalPlayed).toFixed(1)}</div><div class="stat-label">O'RTACHA GOL</div></div>
      <div class="stat-card"><div class="stat-num">48</div><div class="stat-label">ISHTIROKCHI</div></div>
    </div>

    ${allToday.length?`
    <div class="sec-title">⚡ BUGUNGI O'YINLAR (22-23 IYUN)</div>
    <div class="matches-grid" style="margin-bottom:24px">
      ${allToday.map(m=>`<div style="position:relative">${matchCard(m,m.gKey)}<span style="position:absolute;top:8px;right:8px;font-size:10px;color:var(--gold);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px">GURUH ${m.gKey}</span></div>`).join('')}
    </div>`:''}

    ${allDone.length?`
    <div class="sec-title">✅ SO'NGGI NATIJALAR (21-22 IYUN)</div>
    <div class="matches-grid" style="margin-bottom:24px">
      ${allDone.map(m=>`<div style="position:relative">${matchCard(m,m.gKey)}<span style="position:absolute;top:8px;right:8px;font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px">GURUH ${m.gKey}</span></div>`).join('')}
    </div>`:''}

    <div class="sec-title">📊 BARCHA GURUHLAR</div>
    <div class="groups-grid">
      ${Object.keys(GROUPS).map(gk=>{
        const g=GROUPS[gk], st=calcStandings(gk);
        return `<div class="group-mini${g.uzb?" uzb-g":""}" onclick="switchTo('${gk}')">
          <div class="group-mini-title">GURUH ${gk}${g.uzb?' ⭐':''}</div>
          ${st.map((r,i)=>`<div class="mini-row">
            <div class="mini-team"><span>${f(r.name)}</span>
            <span style="${r.name==="O'zbekiston"?"color:#23c96e":""}${i<2?"font-weight:700":""}">${r.name}</span>
            ${i<2?'<span style="font-size:9px;color:#2563eb;margin-left:3px">▲</span>':''}</div>
            <div class="mini-pts">${r.pts}</div>
          </div>`).join('')}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// INIT
function switchTo(key){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const pg=document.getElementById(`page-${key}`);
  if(pg)pg.classList.add('active');
  const tb=document.querySelector(`[data-key="${key}"]`);
  if(tb)tb.classList.add('active');
  window.scrollTo(0,0);
}

const tabsEl=document.getElementById('tabs');
const pagesEl=document.getElementById('pages');

// Overview
const allTab=document.createElement('button');
allTab.className='tab active';allTab.textContent='BARCHASI';allTab.dataset.key='all';
allTab.onclick=()=>switchTo('all');tabsEl.appendChild(allTab);
pagesEl.innerHTML=renderOverview();

// Groups
Object.keys(GROUPS).forEach(gk=>{
  const g=GROUPS[gk];
  const btn=document.createElement('button');
  btn.className='tab'+(g.uzb?' uzb':'');
  btn.textContent=g.uzb?`K ⭐`:gk;
  btn.dataset.key=gk;btn.onclick=()=>switchTo(gk);
  tabsEl.appendChild(btn);
  pagesEl.insertAdjacentHTML('beforeend',renderGroupPage(gk));
});
</script>
