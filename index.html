<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCH 2026 — Jonli Natijalar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080f;--surface:#0d1120;--card:#111827;--border:#1e2a42;--gold:#d4a832;--gold2:#f5d06a;--green:#1a9e5c;--green2:#23c96e;--blue:#2563eb;--text:#e8eaf0;--muted:#5a6880}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}
header{background:linear-gradient(135deg,#0c1525,#0f1e3a);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px #d4a83230}
h1{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.sub{font-size:11px;color:var(--muted);letter-spacing:1.5px;margin-top:2px}
.upill{font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green2);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 15px;background:none;border:none;color:var(--muted);font-family:'Barlow Condensed',cursive;font-size:13px;font-weight:600;letter-spacing:1.2px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.tab.active,.tab:hover{color:var(--gold);border-bottom-color:var(--gold)}
.tab.uzb{color:#23c96e}.tab.uzb.active{border-bottom-color:#23c96e}
.page{display:none;max-width:1060px;margin:0 auto;padding:16px 14px;animation:fi .2s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.sec{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.two-col{grid-template-columns:1fr}}
.mlist{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 13px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:7px}
.mc.uzb{border-color:#1a5c3a;background:#0a1810}
.mc.live{border-color:#cc0000;animation:lp 2s infinite}
@keyframes lp{0%,100%{border-color:#880000}50%{border-color:#ff2222}}
.team{display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',cursive;font-weight:700;font-size:14px}
.team.r{flex-direction:row-reverse;text-align:right}
.flag{font-size:18px}
.uzbt{color:#23c96e}
.ctr{display:flex;flex-direction:column;align-items:center;gap:2px}
.sbox{background:#0d1525;border:1px solid #2a3650;border-radius:7px;padding:3px 10px;text-align:center;min-width:68px}
.sc{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--gold2);letter-spacing:2px;line-height:1}
.sc.up{color:var(--muted);font-size:18px}
.mt{font-size:10px;color:var(--muted)}
.vn{font-size:9px;color:#344158;max-width:110px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bdg{font-size:9px;padding:1px 6px;border-radius:6px;font-family:'Barlow Condensed',cursive;letter-spacing:1px}
.b-done{background:#0e2a16;color:var(--green2);border:1px solid #1a4a25}
.b-live{background:#2a0000;color:#ff4444;border:1px solid #660000}
.b-soon{background:#0e1a2a;color:#5b8fc9;border:1px solid #1a3050}
.mc-w{position:relative}
.gbdg{position:absolute;top:6px;right:8px;font-size:9px;color:var(--gold);font-family:'Barlow Condensed',cursive;letter-spacing:1px}
.sw{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px}
.sw table{width:100%;border-collapse:collapse}
.sw th{font-family:'Barlow Condensed',cursive;font-size:10px;letter-spacing:1.5px;color:var(--muted);padding:7px 4px;border-bottom:1px solid var(--border);text-align:center}
.sw th:nth-child(2){text-align:left}
.sw td{padding:7px 4px;text-align:center;font-family:'Barlow Condensed',cursive;font-size:13px;border-bottom:1px solid #0e1525}
.sw td:nth-child(2){text-align:left}
.sw tr:last-child td{border:none}
.sw tr:hover td{background:#0d1a2a}
.pos{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:4px;font-size:11px;font-weight:700;background:var(--border);color:var(--muted)}
.p1{background:var(--gold)!important;color:#000!important}
.p2{background:#2563eb!important;color:#fff!important}
.p3{background:#1a9e5c!important;color:#fff!important}
.tc{display:flex;align-items:center;gap:5px}
.pts{font-weight:700;color:var(--gold2);font-size:14px}
.gd.pos{color:var(--green2)}.gd.neg{color:#e05252}
.rq1 td{background:#0d1a0e!important}.rq2 td{background:#0d1220!important}.rq3 td{background:#0d1a18!important}
.uzr td{font-weight:600}
.ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:all .15s}
.gcard:hover{border-color:var(--gold);transform:translateY(-2px)}
.gcard.uzb{border-color:#1a5c3a}
.gct{font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:2px;color:var(--gold);margin-bottom:6px}
.mr{display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid #0e1525;font-family:'Barlow Condensed',cursive;font-size:12px}
.mr:last-child{border:none}
.mt2{display:flex;align-items:center;gap:4px}
.mp{color:var(--gold2);font-weight:700}
.srow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.sc2{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 13px;flex:1;min-width:80px;text-align:center}
.sn{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--gold2);line-height:1}
.sl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.uzb-ban{background:linear-gradient(135deg,#0a1f14,#0d2418);border:1px solid #23c96e40;border-radius:12px;padding:12px 15px;margin-bottom:16px}
.uzb-ban h3{font-family:'Bebas Neue',cursive;font-size:17px;color:#23c96e;letter-spacing:2px;margin-bottom:7px}
.uzbs{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.loading{text-align:center;padding:50px 20px;color:var(--muted)}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:#1a0a0a;border:1px solid #4a1515;border-radius:12px;padding:16px;text-align:center;color:#e05252;margin:20px 0}
.retry-btn{background:var(--gold);color:#000;border:none;padding:7px 18px;border-radius:8px;cursor:pointer;font-family:'Barlow Condensed',cursive;font-size:14px;letter-spacing:1px;margin-top:10px}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🏆</div>
    <div>
      <h1>JCH 2026 JONLI KUZATUV</h1>
      <p class="sub">FIFA Jahon Chempionati • Real vaqt natijalar</p>
    </div>
  </div>
  <div class="upill"><div class="dot"></div><span id="upd">Yuklanmoqda...</span></div>
</header>
<nav class="tabs" id="tabs">
  <button class="tab active" data-key="all" onclick="switchTo('all')">BARCHASI</button>
  <button class="tab" data-key="A" onclick="switchTo('A')">A GURUH</button>
  <button class="tab" data-key="B" onclick="switchTo('B')">B GURUH</button>
  <button class="tab" data-key="C" onclick="switchTo('C')">C GURUH</button>
  <button class="tab" data-key="D" onclick="switchTo('D')">D GURUH</button>
  <button class="tab" data-key="E" onclick="switchTo('E')">E GURUH</button>
  <button class="tab" data-key="F" onclick="switchTo('F')">F GURUH</button>
  <button class="tab" data-key="G" onclick="switchTo('G')">G GURUH</button>
  <button class="tab" data-key="H" onclick="switchTo('H')">H GURUH</button>
  <button class="tab" data-key="I" onclick="switchTo('I')">I GURUH</button>
  <button class="tab" data-key="J" onclick="switchTo('J')">J GURUH</button>
  <button class="tab uzb" data-key="K" onclick="switchTo('K')">K GURUH ⭐</button>
  <button class="tab" data-key="L" onclick="switchTo('L')">L GURUH</button>
</nav>
<div id="pages">
  <div class="page active" id="page-all"><div class="loading"><div class="spin"></div>Yuklanmoqda...</div></div>
  <div class="page" id="page-A"></div><div class="page" id="page-B"></div>
  <div class="page" id="page-C"></div><div class="page" id="page-D"></div>
  <div class="page" id="page-E"></div><div class="page" id="page-F"></div>
  <div class="page" id="page-G"></div><div class="page" id="page-H"></div>
  <div class="page" id="page-I"></div><div class="page" id="page-J"></div>
  <div class="page" id="page-K"></div><div class="page" id="page-L"></div>
</div>
<script>
// ============================================================
// O'ZBEKCHA NOMLAR VA BAYROQLAR
// ============================================================
const UZ={
  "Mexico":"Meksika","South Africa":"Janubiy Afrika","South Korea":"Janubiy Koreya",
  "Czechia":"Chexiya","Czech Republic":"Chexiya","Canada":"Kanada",
  "Bosnia and Herzegovina":"Bosniya","Qatar":"Qatar","Switzerland":"Shveytsariya",
  "Brazil":"Braziliya","Morocco":"Marokash","Scotland":"Shotlandiya","Haiti":"Gaiti",
  "USA":"AQSh","United States":"AQSh","Paraguay":"Paragvay","Australia":"Avstraliya",
  "Turkiye":"Turkiya","Turkey":"Turkiya","Germany":"Germaniya","Curacao":"Kyurasao",
  "Cote d'Ivoire":"Kot-d'Ivuar","Ivory Coast":"Kot-d'Ivuar","Ecuador":"Ekvador",
  "Netherlands":"Niderlandiya","Japan":"Yaponiya","Sweden":"Shvetsiya","Tunisia":"Tunis",
  "Belgium":"Belgiya","Iran":"Eron","Egypt":"Misr","New Zealand":"Yangi Zelandiya",
  "Spain":"Ispaniya","Cape Verde":"Kabo-Verde","Cabo Verde":"Kabo-Verde",
  "Saudi Arabia":"Saudiya Arabistoni","Uruguay":"Urugvay","France":"Fransiya",
  "Senegal":"Senegal","Iraq":"Iroq","Norway":"Norvegiya","Argentina":"Argentina",
  "Algeria":"Jazoir","Austria":"Avstriya","Jordan":"Iordaniya","Portugal":"Portugaliya",
  "DR Congo":"Kongo DR","Congo DR":"Kongo DR","Uzbekistan":"O'zbekiston",
  "Colombia":"Kolumbiya","England":"Angliya","Croatia":"Xorvatiya",
  "Ghana":"Gana","Panama":"Panama"
};
const FL={
  "Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czechia":"🇨🇿",
  "Canada":"🇨🇦","Bosnia and Herzegovina":"🇧🇦","Qatar":"🇶🇦","Switzerland":"🇨🇭",
  "Brazil":"🇧🇷","Morocco":"🇲🇦","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Haiti":"🇭🇹",
  "USA":"🇺🇸","United States":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺",
  "Turkiye":"🇹🇷","Turkey":"🇹🇷","Germany":"🇩🇪","Curacao":"🇨🇼",
  "Cote d'Ivoire":"🇨🇮","Ecuador":"🇪🇨","Netherlands":"🇳🇱","Japan":"🇯🇵",
  "Sweden":"🇸🇪","Tunisia":"🇹🇳","Belgium":"🇧🇪","Iran":"🇮🇷","Egypt":"🇪🇬",
  "New Zealand":"🇳🇿","Spain":"🇪🇸","Cape Verde":"🇨🇻","Cabo Verde":"🇨🇻",
  "Saudi Arabia":"🇸🇦","Uruguay":"🇺🇾","France":"🇫🇷","Senegal":"🇸🇳",
  "Iraq":"🇮🇶","Norway":"🇳🇴","Argentina":"🇦🇷","Algeria":"🇩🇿",
  "Austria":"🇦🇹","Jordan":"🇯🇴","Portugal":"🇵🇹","DR Congo":"🇨🇩",
  "Uzbekistan":"🇺🇿","Colombia":"🇨🇴","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croatia":"🇭🇷",
  "Ghana":"🇬🇭","Panama":"🇵🇦"
};

function uz(n){return UZ[n]||n}
function fl(n){return FL[n]||"🏳️"}
function isUzb(n){return n==="Uzbekistan"}

// Toshkent vaqti (UTC+5)
function tshTime(utcStr){
  if(!utcStr)return"—";
  const d=new Date(utcStr);
  return d.toLocaleTimeString('uz',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Tashkent'});
}
function tshDate(utcStr){
  if(!utcStr)return"";
  const d=new Date(utcStr);
  return d.toLocaleDateString('uz',{day:'2-digit',month:'2-digit',timeZone:'Asia/Tashkent'});
}
function isToday(utcStr){
  if(!utcStr)return false;
  const d=new Date(utcStr);
  const now=new Date();
  const tsh=new Date(d.getTime());
  const nowTsh=new Date(now.getTime());
  // UTC+5
  const dDay=new Date(tsh.getTime()+5*3600000);
  const nDay=new Date(nowTsh.getTime()+5*3600000);
  return dDay.toDateString()===nDay.toDateString();
}

// ============================================================
// GURUH → O'YIN MA'LUMOTLARI (worldcup26.ir API dan keladi)
// Bu yerda faqat UZB o'yinlari belgisi saqlanadi
// ============================================================
const UZB_MATCHES=[
  "Uzbekistan|Colombia","Colombia|Uzbekistan",
  "Portugal|Uzbekistan","Uzbekistan|Portugal",
  "DR Congo|Uzbekistan","Uzbekistan|DR Congo"
];
function isUzbMatch(h,a){
  return UZB_MATCHES.includes(`${h}|${a}`)||isUzb(h)||isUzb(a);
}

// Guruh nomlarini API formatidan o'zgartirish
function groupLetter(g){
  if(!g)return"?";
  // "Group A" yoki "A" formatlar
  const m=g.match(/([A-L])/);
  return m?m[1]:"?";
}

// API ma'lumotlari
let ALL_GAMES=[];
let GROUPS_DATA={};

// ============================================================
// worldcup26.ir API
// ============================================================
async function fetchAPI(){
  try{
    const [gamesRes, groupsRes]=await Promise.all([
      fetch('https://worldcup26.ir/get/games'),
      fetch('https://worldcup26.ir/get/groups')
    ]);
    const games=await gamesRes.json();
    const groups=await groupsRes.json();
    ALL_GAMES=Array.isArray(games)?games:(games.games||games.data||[]);
    GROUPS_DATA=groups;
    return true;
  }catch(e){
    console.error('API xatosi:',e);
    return false;
  }
}

// ============================================================
// RENDER FUNKSIYALARI
// ============================================================
function renderMC(game,showG=false){
  const h=game.home_team?.name||game.homeTeam||"";
  const a=game.away_team?.name||game.awayTeam||"";
  const hg=game.home_score??game.homeScore??null;
  const ag=game.away_score??game.awayScore??null;
  const status=game.status||"";
  const date=game.date||game.match_date||"";
  const venue=game.venue||game.stadium||"";
  const gKey=groupLetter(game.group||game.stage||"");

  const done=status==="FINISHED"||status==="FT"||status==="finished";
  const live=status==="LIVE"||status==="IN_PLAY"||status==="1H"||status==="2H"||status==="HT";
  const uzb=isUzbMatch(h,a);

  const scoreStr=done&&hg!==null?`${hg} : ${ag}`:live&&hg!==null?`${hg} : ${ag}`:`— : —`;
  const scCls=done||live?'sc':'sc up';
  const badge=live?`<span class="bdg b-live">🔴 JONLI</span>`:
    done?`<span class="bdg b-done">✓ TUGADI</span>`:
    `<span class="bdg b-soon">📅 ${tshDate(date)}</span>`;

  return`<div class="mc-w">
    <div class="mc${uzb?' uzb':''}${live?' live':''}">
      <div class="team"><span class="flag">${fl(h)}</span><span${isUzb(h)?' class="uzbt"':''}>${uz(h)}</span></div>
      <div class="ctr">
        <div class="sbox"><div class="${scCls}">${scoreStr}</div></div>
        <div class="mt">${tshDate(date)} · ${tshTime(date)} TSH</div>
        <div class="vn">${venue}</div>
        ${badge}
      </div>
      <div class="team r"><span class="flag">${fl(a)}</span><span${isUzb(a)?' class="uzbt"':''}>${uz(a)}</span></div>
    </div>
    ${showG&&gKey?`<span class="gbdg">${gKey} GURUH</span>`:''}
  </div>`;
}

function calcStandingsFromAPI(gKey){
  const gGames=ALL_GAMES.filter(g=>groupLetter(g.group||g.stage||"")=== gKey);
  const stats={};
  gGames.forEach(game=>{
    const h=game.home_team?.name||game.homeTeam||"";
    const a=game.away_team?.name||game.awayTeam||"";
    if(!h||!a)return;
    if(!stats[h])stats[h]={mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    if(!stats[a])stats[a]={mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    const status=game.status||"";
    const done=status==="FINISHED"||status==="FT"||status==="finished";
    if(!done)return;
    const hg=parseInt(game.home_score??game.homeScore??-1);
    const ag=parseInt(game.away_score??game.awayScore??-1);
    if(isNaN(hg)||isNaN(ag)||hg<0||ag<0)return;
    stats[h].mp++;stats[a].mp++;
    stats[h].gf+=hg;stats[h].ga+=ag;
    stats[a].gf+=ag;stats[a].ga+=hg;
    if(hg>ag){stats[h].w++;stats[a].l++;stats[h].pts+=3;}
    else if(hg<ag){stats[a].w++;stats[h].l++;stats[a].pts+=3;}
    else{stats[h].d++;stats[a].d++;stats[h].pts++;stats[a].pts++;}
  });
  return Object.entries(stats).map(([n,s])=>({name:n,...s,gd:s.gf-s.ga}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

function renderStandings(gKey){
  const rows=calcStandingsFromAPI(gKey);
  if(!rows.length)return`<div style="color:var(--muted);font-size:13px;padding:10px">Ma'lumot yuklanmoqda...</div>`;
  const pc=i=>i===0?'p1':i===1?'p2':i===2?'p3':'';
  const rc=i=>i===0?'rq1':i===1?'rq2':i===2?'rq3':'';
  return`<div class="sw"><table>
    <thead><tr><th>#</th><th>JAMOA</th><th>O</th><th>G</th><th>D</th><th>M</th><th>UG</th><th>KG</th><th>FF</th><th>BAL</th></tr></thead>
    <tbody>
    ${rows.map((r,i)=>{const gd=r.gd;return`<tr class="${rc(i)}${isUzb(r.name)?' uzr':''}">
      <td><span class="pos ${pc(i)}">${i+1}</span></td>
      <td><div class="tc"><span>${fl(r.name)}</span><span${isUzb(r.name)?' style="color:#23c96e"':''}>${uz(r.name)}</span></div></td>
      <td>${r.mp}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
      <td>${r.gf}</td><td>${r.ga}</td>
      <td class="gd${gd>0?' pos':gd<0?' neg':''}">${gd>0?'+':''}${gd}</td>
      <td class="pts">${r.pts}</td>
    </tr>`;}).join('')}
    </tbody>
  </table></div>`;
}

function renderGroupPage(gKey){
  const gGames=ALL_GAMES.filter(g=>groupLetter(g.group||g.stage||"")===gKey);
  const done=gGames.filter(g=>{const s=g.status||"";return s==="FINISHED"||s==="FT"||s==="finished";});
  const live=gGames.filter(g=>{const s=g.status||"";return s==="LIVE"||s==="IN_PLAY"||s==="1H"||s==="2H"||s==="HT";});
  const upcoming=gGames.filter(g=>{const s=g.status||"";return !["FINISHED","FT","finished","LIVE","IN_PLAY","1H","2H","HT"].includes(s);});
  const isK=gKey==='K';
  const st=calcStandingsFromAPI(gKey);
  const uzbR=st.find(r=>isUzb(r.name));
  const uzbP=st.findIndex(r=>isUzb(r.name))+1;

  document.getElementById(`page-${gKey}`).innerHTML=`
    <div class="sec">🏅 ${gKey} GURUH${isK?' — <span style="color:#23c96e">O\'ZBEKISTON ⭐</span>':''}</div>
    ${isK&&uzbR?`<div class="uzb-ban">
      <h3>🇺🇿 O'ZBEKISTON HOLATI</h3>
      <div class="uzbs">
        <span style="font-family:'Bebas Neue',cursive;font-size:24px;color:#23c96e">
          ${uzbP===1?"🥇 1-O'RIN":uzbP===2?"🥈 2-O'RIN":uzbP===3?"🥉 3-O'RIN":"4-O'RIN"}
        </span>
        <span style="color:#23c96e;font-size:13px">${uzbP<=2?"✅ PLAYOFF GA CHIQMOQDA":uzbP===3?"⚠️ EHTIMOLIY":"❌ TASHQARIDA"}</span>
        <span style="color:var(--muted);font-size:12px">${uzbR.pts} ball · FF: ${uzbR.gd>0?"+":""}${uzbR.gd}</span>
      </div>
    </div>`:''}
    <div class="two-col">
      <div>
        <div class="sec" style="font-size:16px">📊 TURNIR JADVALI</div>
        ${renderStandings(gKey)}
        <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:10.5px;color:var(--muted);margin-top:6px">
          <span>🟡 1-o'rin→Playoff</span><span>🔵 2-o'rin→Playoff</span><span>🟢 3-o'rin→Ehtimol</span>
        </div>
      </div>
      <div>
        ${live.length?`<div class="sec" style="font-size:15px;color:#ff4444">🔴 JONLI</div><div class="mlist">${live.map(g=>renderMC(g)).join('')}</div>`:''}
        ${done.length?`<div class="sec" style="font-size:15px">✅ TUGAGAN</div><div class="mlist">${done.map(g=>renderMC(g)).join('')}</div>`:''}
        ${upcoming.length?`<div class="sec" style="font-size:15px">📅 KELGUSI</div><div class="mlist">${upcoming.map(g=>renderMC(g)).join('')}</div>`:''}
      </div>
    </div>`;
}

function renderOverview(){
  const live=ALL_GAMES.filter(g=>{const s=g.status||"";return s==="LIVE"||s==="IN_PLAY"||s==="1H"||s==="2H"||s==="HT";});
  const done=ALL_GAMES.filter(g=>{const s=g.status||"";return s==="FINISHED"||s==="FT"||s==="finished";});
  const todayGames=ALL_GAMES.filter(g=>isToday(g.date||g.match_date||"")&&!["FINISHED","FT","finished"].includes(g.status||""));
  const recent=[...done].reverse().slice(0,8);
  let totalG=0;
  done.forEach(g=>{
    const hg=parseInt(g.home_score??g.homeScore??0);
    const ag=parseInt(g.away_score??g.awayScore??0);
    if(!isNaN(hg)&&!isNaN(ag))totalG+=hg+ag;
  });

  const groups=['A','B','C','D','E','F','G','H','I','J','K','L'];
  document.getElementById('page-all').innerHTML=`
    <div class="srow">
      <div class="sc2"><div class="sn">${done.length}</div><div class="sl">TUGAGAN</div></div>
      <div class="sc2"><div class="sn">${totalG}</div><div class="sl">GOLLAR</div></div>
      <div class="sc2"><div class="sn">${done.length?(totalG/done.length).toFixed(1):'—'}</div><div class="sl">O'RTACHA GOL</div></div>
      <div class="sc2"><div class="sn">48</div><div class="sl">JAMOALAR</div></div>
    </div>
    ${live.length?`<div class="sec">🔴 HOZIR JONLI</div><div class="mlist">${live.map(g=>renderMC(g,true)).join('')}</div>`:''}
    ${todayGames.length?`<div class="sec">⚡ BUGUNGI O'YINLAR</div><div class="mlist">${todayGames.map(g=>renderMC(g,true)).join('')}</div>`:''}
    <div class="sec">✅ SO'NGGI NATIJALAR</div>
    <div class="mlist">${recent.map(g=>renderMC(g,true)).join('')}</div>
    <div class="sec">📊 BARCHA GURUHLAR</div>
    <div class="ogrid">
    ${groups.map(gk=>{
      const st=calcStandingsFromAPI(gk);
      const isK=gk==='K';
      return`<div class="gcard${isK?' uzb':''}" onclick="switchTo('${gk}')">
        <div class="gct">${gk} GURUH${isK?' ⭐':''}</div>
        ${st.map((r,i)=>`<div class="mr">
          <div class="mt2"><span>${fl(r.name)}</span>
          <span${isUzb(r.name)?' style="color:#23c96e"':''}${i<2?' style="font-weight:700"':''}>${uz(r.name)}</span>
          ${i<2?'<span style="font-size:9px;color:#2563eb;margin-left:2px">▲</span>':''}
          </div><span class="mp">${r.pts}</span>
        </div>`).join('')}
      </div>`;
    }).join('')}
    </div>`;
}

function switchTo(key){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`page-${key}`)?.classList.add('active');
  document.querySelector(`[data-key="${key}"]`)?.classList.add('active');
  window.scrollTo(0,0);
  if(key!=='all') renderGroupPage(key);
}

async function init(){
  const ok=await fetchAPI();
  if(!ok){
    document.getElementById('page-all').innerHTML=`
      <div class="err-box">
        ⚠️ Internet ulanishini tekshiring yoki sahifani yangilang
        <br><button class="retry-btn" onclick="init()">🔄 QAYTA URINISH</button>
      </div>`;
    return;
  }
  renderOverview();
  ['A','B','C','D','E','F','G','H','I','J','K','L'].forEach(g=>renderGroupPage(g));
  const t=new Date();
  const tsh=new Date(t.getTime()+5*3600000);
  document.getElementById('upd').textContent=
    `Yangilandi: ${String(tsh.getUTCHours()).padStart(2,'0')}:${String(tsh.getUTCMinutes()).padStart(2,'0')} TSH`;
  // Har 60 soniyada avtomatik yangilanish
  setTimeout(()=>location.reload(),60000);
}

init();
</script>
</body>
</html>
