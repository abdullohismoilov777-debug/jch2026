<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCH 2026 — Jonli Natijalar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080f;--card:#0f1623;--border:#1e2a42;--gold:#d4a832;--gold2:#f5d06a;--green:#23c96e;--blue:#2563eb;--text:#e8eaf0;--muted:#5a6880}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}
/* HEADER */
.hdr{background:linear-gradient(135deg,#0a1020,#0d1835);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:300}
.hbtn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px}
.hbtn:hover{background:#1e2a42}
.hlogo{display:flex;align-items:center;gap:8px;flex:1}
.hicon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.htitle{font-size:16px;font-weight:900;letter-spacing:1px;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hsub{font-size:10px;color:var(--muted)}
.hright{display:flex;align-items:center;gap:8px;flex-shrink:0}
/* LANG */
.lbtn{position:relative}
.lsel{background:#0d1525;border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px}
.ldrop{position:absolute;top:calc(100% + 4px);right:0;background:#0d1525;border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:400;min-width:130px;display:none;box-shadow:0 8px 24px #000a}
.ldrop.open{display:block}
.lopt{padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.lopt:hover{background:#1e2a42}
.lopt.on{color:var(--gold)}
/* CLOCK */
.upill{font-size:10px;color:var(--muted);background:#0d1120;border:1px solid var(--border);border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* SIDEMENU */
.ovl{position:fixed;inset:0;background:#0006;z-index:400;display:none}
.ovl.on{display:block}
.smenu{position:fixed;top:0;left:-260px;width:260px;height:100vh;background:#0a0e1e;border-right:1px solid var(--border);z-index:500;transition:left .25s;overflow-y:auto}
.smenu.on{left:0}
.smhdr{padding:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.smtitle{font-size:15px;font-weight:800;color:var(--gold);flex:1}
.smclose{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.smitem{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;font-size:13px;font-weight:700;border-bottom:1px solid #0e1525;transition:.15s;color:var(--muted)}
.smitem:hover{background:#1e2a42;color:var(--gold)}
.smitem.on{background:#0d1525;color:var(--gold)}
.smicon{font-size:17px;width:22px;text-align:center}
/* MAIN 2 TABS */
.mtabs{display:flex;background:#080c18;border-bottom:2px solid var(--border)}
.mtab{flex:1;padding:12px 8px;background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;text-align:center}
.mtab.on{color:var(--gold);border-bottom-color:var(--gold);background:#0a0f1e}
.mtab.po.on{color:#ff6b35;border-bottom-color:#ff6b35}
/* GROUP SUB TABS */
.gtabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg);scrollbar-width:none;position:sticky;top:57px;z-index:200}
.gtabs::-webkit-scrollbar{display:none}
.gtab{padding:8px 13px;background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.15s}
.gtab:hover,.gtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.gtab.uzb{color:var(--green)}.gtab.uzb.on{border-bottom-color:var(--green)}
/* FILTER */
.fwrap{padding:10px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.fwrap::-webkit-scrollbar{display:none}
.ftab{padding:5px 12px;background:#0d1525;border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);white-space:nowrap;transition:.15s}
.ftab.on,.ftab:hover{background:#1e2a42;color:var(--gold);border-color:var(--gold)}
/* PAGES */
.pg{display:none;max-width:1060px;margin:0 auto;padding:14px}
.pg.on{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
/* SEC TITLE */
.sec{font-size:12px;font-weight:800;letter-spacing:1px;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px;padding-top:4px}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
/* MATCH CARD */
.mlist{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 12px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;position:relative}
.mc.uzb{border-color:#1a5c3a;background:#0a1810}
.mc.live{border-color:#cc0000;animation:lp 2s infinite}
@keyframes lp{0%,100%{border-color:#880000}50%{border-color:#e84040}}
.team{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700}
.team.r{flex-direction:row-reverse;text-align:right}
.team img{width:20px;height:15px;border-radius:2px;object-fit:cover}
.uzbt{color:var(--green)}
.ctr{display:flex;flex-direction:column;align-items:center;gap:2px}
.sbox{background:#080c18;border:1px solid #2a3650;border-radius:7px;padding:3px 10px;text-align:center;min-width:70px}
.sc{font-size:20px;font-weight:900;color:var(--gold2);letter-spacing:1px;line-height:1}
.sc.tbd{font-size:16px;color:var(--muted)}
.mtime{font-size:9px;color:var(--muted)}
.mvenue{font-size:8px;color:#2a3650;max-width:100px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bdg{font-size:9px;padding:2px 7px;border-radius:6px;font-weight:700}
.bdone{background:#0e2a16;color:var(--green);border:1px solid #1a4a25}
.blive{background:#2a0000;color:#ff4444;border:1px solid #660000}
.bsoon{background:#0e1a2a;color:#5b8fc9;border:1px solid #1a3050}
.gbdg{position:absolute;top:5px;right:8px;font-size:9px;color:var(--gold);font-weight:700}
/* LIVE TIMER */
.ltimer{display:inline-flex;align-items:center;gap:4px;background:#1a0000;border:1px solid #660000;border-radius:6px;padding:2px 7px;font-size:11px;font-weight:800;color:#ff4444}
.ldot{width:5px;height:5px;border-radius:50%;background:#ff4444;animation:pulse 1s infinite}
/* STANDINGS */
.sw{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.sw table{width:100%;border-collapse:collapse}
.sw th{font-size:9px;letter-spacing:1px;color:var(--muted);padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;font-weight:700}
.sw th:nth-child(2){text-align:left}
.sw td{padding:6px 4px;text-align:center;font-size:12px;font-weight:600;border-bottom:1px solid #0a0f1a}
.sw td:nth-child(2){text-align:left}
.sw tr:last-child td{border:none}
.sw tr:hover td{background:#0d1a2a}
.pos{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;font-size:10px;font-weight:800;background:var(--border);color:var(--muted)}
.p1{background:var(--gold)!important;color:#000!important}
.p2{background:var(--blue)!important;color:#fff!important}
.p3{background:#1a9e5c!important;color:#fff!important}
.pts{font-weight:800;color:var(--gold2)}
.gdp{color:var(--green)}.gdn{color:#e05252}
.rq1 td{background:#0d1a0e!important}.rq2 td{background:#0d1220!important}.rq3 td{background:#0d1a18!important}
.uzr td{font-weight:800}
.tc{display:flex;align-items:center;gap:5px}
.tc img{width:17px;height:12px;border-radius:1px;object-fit:cover}
/* STAT CARDS */
.srow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;flex:1;min-width:70px;text-align:center}
.snum{font-size:24px;font-weight:900;color:var(--gold2);line-height:1}
.slbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px;font-weight:600}
/* UZB BANNER */
.uban{background:linear-gradient(135deg,#071510,#0a1f14);border:1px solid #23c96e40;border-radius:12px;padding:12px 14px;margin-bottom:14px}
.uban h3{font-size:13px;font-weight:800;color:var(--green);letter-spacing:1px;margin-bottom:6px}
.ubans{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
/* INFO BOX */
.ibox{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:11px;color:var(--muted);line-height:1.7}
/* GROUP GRID */
.ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px;cursor:pointer;transition:.15s}
.gcard:hover{border-color:var(--gold);transform:translateY(-2px)}
.gcard.uzb{border-color:#1a5c3a}
.gctitle{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:6px}
.grow{display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid #0a0f1a;font-size:12px;font-weight:600}
.grow:last-child{border:none}
.grt{display:flex;align-items:center;gap:4px}
.grt img{width:15px;height:11px;border-radius:1px;object-fit:cover}
.gpts{color:var(--gold2);font-weight:800}
/* DATE GROUP */
.dglbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;padding:8px 0 4px;text-transform:uppercase}
/* SCORERS */
.sclist{display:flex;flex-direction:column;gap:6px}
.scitem{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:10px}
.scno{font-size:13px;font-weight:800;color:var(--muted);min-width:22px}
.scno.g1{color:#ffd700}.scno.g2{color:#c0c0c0}.scno.g3{color:#cd7f32}
.scinfo{flex:1}
.scname{font-size:13px;font-weight:700}
.scteam{font-size:10px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px}
.scteam img{width:15px;height:11px;border-radius:1px;object-fit:cover}
.scgoals{font-size:20px;font-weight:900;color:var(--gold2)}
/* TWO COL */
.tcol{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.tcol{grid-template-columns:1fr}}
/* BRACKET */
.brkouter{overflow-x:auto;padding-bottom:10px}
.brkflex{display:flex;align-items:stretch;gap:0;min-width:1080px}
.brkrnd{display:flex;flex-direction:column;flex:1;min-width:132px}
.brkrtitle{text-align:center;color:var(--gold);font-size:9px;letter-spacing:1px;padding:5px 2px;border-bottom:1px solid var(--border);margin-bottom:4px;font-weight:800}
.brkms{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:4px}
.brkmatch{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative}
.brkmatch.live{border-color:#cc0000}
.brkmatch.done{border-color:#1a5c3a}
.brkmatch.uzb{border-color:var(--green);background:#0a1810}
.brkteam{display:flex;align-items:center;padding:5px 6px;font-size:11px;font-weight:700;gap:4px;border-bottom:1px solid #0a0f1a;min-height:26px}
.brkteam:last-of-type{border-bottom:none}
.brkteam.win{background:#0d1a0e}
.brkteam.tbd{color:var(--muted);font-style:italic;font-size:9px;font-weight:400}
.brkteam img{width:15px;height:11px;border-radius:1px;object-fit:cover}
.brksc{margin-left:auto;font-size:14px;font-weight:900;color:var(--gold2);min-width:12px;text-align:center}
.brkdate{font-size:7px;color:var(--muted);text-align:center;padding:2px;background:#060910}
.brkno{position:absolute;top:2px;right:4px;font-size:7px;color:#2a3650}
.brkconn{width:20px;align-self:stretch;flex-shrink:0}
.brkfinal{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 6px;flex-shrink:0;width:148px}
.brkfinalbox{background:linear-gradient(135deg,#120e00,#1e1800);border:2px solid var(--gold);border-radius:12px;padding:8px;width:100%}
/* LOADING / ERROR */
.loading{text-align:center;padding:40px;color:var(--muted)}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{background:#1a0a0a;border:1px solid #4a1515;border-radius:12px;padding:14px;text-align:center;color:#e05252;margin:16px 0}
.rbtn{background:var(--gold);color:#000;border:none;padding:7px 16px;border-radius:8px;cursor:pointer;font-weight:700;margin-top:8px;font-family:'Inter',sans-serif}
</style>
</head>
